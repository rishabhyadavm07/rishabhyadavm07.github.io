e this directly?", "options": {"A": "Standardization of container image formats.", "B": "Automated cluster-wide scheduling and resource management.", "C": "Tools for building smaller container images.", "D": "Secure private container image registries.", "E": "Faster container boot times."}, "answer": "B", "explanation": "While all options are part of the broader ecosystem, the direct answer to managing many containers on many hosts is the automated scheduling (placing containers on appropriate hosts) and resource management (allocating CPU/memory) provided by orchestrators like Kubernetes.", "domain": null, "competency": "Container Orchestration Fundamentals"}, {"id": 50, "question": "The rise of cloud native architectures has emphasized &quot;Immutable Infrastructure&quot;. What does this principle mean in the context of deployments?", "options": {"A": "Infrastructure components are never patched or updated once deployed.", "B": "Deployments are updated by creating new instances (e.g., containers, VMs) rather than modifying existing ones.", "C": "Only specific approved vendors can provide infrastructure components.", "D": "Infrastructure configuration is stored in mutable databases.", "E": "All infrastructure must run in a single availability zone for consistency."}, "answer": "B", "explanation": "Immutable Infrastructure treats servers or containers as ephemeral units. Instead of updating an existing instance in-place, you build a new version (e.g., a new container image), deploy new instances based on it, and then decommission the old ones. This leads to more predictable and reliable deployments.", "domain": null, "competency": "Open Standards"}, {"id": 50, "question": "What is a key outcome of adopting mature CI/CD practices?", "options": {"A": "Longer lead times for changes due to increased process overhead.", "B": "Reduced deployment frequency to minimize risk.", "C": "Faster, more reliable delivery of value to end-users through automation and rapid feedback.", "D": "Increased reliance on manual testing and deployment procedures.", "E": "Complete elimination of bugs in production environments."}, "answer": "C", "explanation": "Mature CI/CD pipelines automate the build, test, and deployment process, significantly reducing lead time (time from commit to production) and enabling more frequent, reliable releases. This allows businesses to deliver features and fixes to users faster and get feedback more quickly.", "domain": null, "competency": "CI/CD"}, {"id": 50, "question": "What is the core difference between &quot;authentication&quot; and &quot;authorization&quot; in Kubernetes security?", "options": {"A": "Authentication is for users, authorization for service accounts.", "B": "Authentication verifies identity, authorization verifies permissions.", "C": "Authorization happens before authentication in the API request flow.", "D": "Authentication uses Roles, authorization uses RoleBindings.", "E": "Authorization uses client certificates, authentication uses tokens."}, "answer": "B", "explanation": "Authentication is the process of determining who a user or service is. Authorization is the process of determining what an authenticated user or service is allowed to do (i.e., which API resources they can access and what actions they can perform).", "domain": "Container Orchestration", "competency": "Security"}, {"id": 50, "question": "When Prometheus fails to scrape a target (e.g., due to network issues or the target being down), what value will the up metric for that target typically have?", "options": {"A": "1", "B": "-1", "D": "NaN (Not a Number)", "E": "The metric will be absent (no data point recorded)."}, "answer": "C", "explanation": "The up metric explicitly indicates scrape success or failure. A value of 1 means the scrape succeeded, while 0 means it failed for any reason (timeout, connection refused, non-200 HTTP response, etc.).", "domain": null, "competency": "Prometheus"}, {"id": 51, "question": "What is the smallest and simplest deployable unit object created and managed by Kubernetes?", "options": {"A": "Node", "B": "Container", "C": "Pod", "D": "Deployment"}, "answer": "C", "explanation": "A Pod represents a single instance of a running process in a cluster and can contain one or more containers. Nodes host Pods.", "domain": "Kubernetes Fundamentals", "competency": "Kubernetes Resources"}, {"id": 52, "question": "Which Kubernetes component is responsible for watching for newly created Pods and assigning them to Nodes?", "options": {"A": "kube-apiserver", "B": "etcd", "C": "kube-scheduler", "D": "kubelet"}, "answer": "C", "explanation": "The kube-scheduler is the control plane component that decides which Node a Pod should run on based on constraints and availability.", "domain": "Kubernetes Fundamentals", "competency": "Kubernetes Architecture"}, {"id": 53, "question": "What is the primary function of the kubelet component?", "options": {"A": "Storing cluster state", "B": "Scheduling Pods onto Nodes", "C": "Managing the container runtime", "D": "Exposing the Kubernetes API"}, "answer": "C", "explanation": "The kubelet runs on each Node and ensures that containers described in PodSpecs are running and healthy. It interacts with the container runtime.", "domain": "Kubernetes Fundamentals", "competency": "Kubernetes Architecture"}, {"id": 54, "question": "Which component acts as the central control plane and exposes the Kubernetes API?", "options": {"A": "kube-proxy", "B": "kube-apiserver", "C": "etcd", "D": "controller-manager"}, "answer": "B", "explanation": "The kube-apiserver validates and configures data for API objects (Pods, Services, etc.) and is the frontend for the control plane.", "domain": "Kubernetes Fundamentals", "competency": "Kubernetes API"}, {"id": 55, "question": "What is the primary role of etcd in a Kubernetes cluster?", "options": {"A": "Running application containers", "B": "Scheduling workloads", "C": "Storing the cluster state", "D": "Managing network policies"}, "answer": "C", "explanation": "etcd is a consistent and highly-available key-value store used as Kubernetes&#x27; backing store for all cluster data.", "domain": "Kubernetes 1  Fundamentals", "competency": "Kubernetes Architecture"}, {"id": 56, "question": "Which Kubernetes resource is typically used to manage stateless applications by ensuring a specified number of Pod replicas are running?", "options": {"A": "StatefulSet", "B": "DaemonSet", "C": "Deployment", "D": "Job"}, "answer": "C", "explanation": "Deployments manage ReplicaSets, providing declarative updates and scaling for stateless applications.", "domain": "Kubernetes Fundamentals", "competency": "Kubernetes Resources"}, {"id": 57, "question": "What type of software package bundles application code with all its dependencies, libraries, and configuration files?", "options": {"A": "Virtual Machine", "B": "Container", "C": "Operating System", "D": "Serverless Function"}, "answer": "B", "explanation": "Containers package application code and dependencies together, isolating them from the underlying infrastructure.", "domain": "Kubernetes Fundamentals", "competency": "Containers"}, {"id": 58, "question": "In Kubernetes, what is the process of assigning Pods to Nodes called?", "options": {"A": "Replication", "B": "Orchestration", "C": "Scheduling", "D": "Deployment"}, "answer": "C", "explanation": "Scheduling is the core function of the kube-scheduler, selecting appropriate Nodes for Pods based on resource requests and other factors.", "domain": "Kubernetes Fundamentals", "competency": "Scheduling"}, {"id": 59, "question": "What is the main benefit of using container orchestration systems like Kubernetes?", "options": {"A": "Simplifying code writing", "B": "Automating deployment &amp; scaling", "C": "Reducing storage costs", "D": "Improving network latency"}, "answer": "B", "explanation": "Orchestrators automate the deployment, scaling, management, and networking of containerized applications.", "domain": "Container Orchestration", "competency": "Container Orchestration Fundamentals"}, {"id": 60, "question": "Which of these is a standard specified by the OCI (Open Container Initiative)?", "options": {"A": "Docker", "B": "Kubernetes", "C": "Image Specification", "D": "Istio"}, "answer": "C", "explanation": "The OCI defines standards for container image formats (Image Specification) and runtime (Runtime Specification).", "domain": "Kubernetes Fundamentals", "competency": "Containers"}, {"id": 61, "question": "Which container runtime is most commonly associated with Kubernetes and implements the CRI (Container Runtime Interface)?", "options": {"A": "Docker (dockershim)", "B": "containerd", "C": "rkt", "D": "LXC"}, "answer": "B", "explanation": "containerd is a widely used container runtime focused on simplicity, robustness, and portability, fully implementing the CRI.", "domain": "Container Orchestration", "competency": "Runtime"}, {"id": 62, "question": "What Kubernetes object provides a stable IP address and DNS name for accessing a set of Pods?", "options": {"A": "Ingress", "B": "Service", "C": "EndpointSlice", "D": "NetworkPolicy"}, "answer": "B", "explanation": "A Service defines a logical set of Pods and a policy by which to access them, providing load balancing and service discovery.", "domain": "Container Orchestration", "competency": "Networking"}, {"id": 63, "question": "How can you securely store sensitive information like passwords or API keys in Kubernetes?", "options": {"A": "ConfigMap", "B": "Annotation", "C": "Label", "D": "Secret"}, "answer": "D", "explanation": "Secrets are Kubernetes objects specifically designed to hold small amounts of sensitive data.", "domain": "Container Orchestration", "competency": "Security"}, {"id": 64, "question": "What is the role of a CNI (Container Network Interface) plugin in Kubernetes?", "options": {"A": "Managing storage volumes", "B": "Providing container networking", "C": "Scheduling Pods", "D": "Securing the API server"}, "answer": "B", "explanation": "CNI plugins are responsible for configuring network interfaces for containers and managing IP address allocation within the cluster.", "domain": "Container Orchestration", "competency": "Networking"}, {"id": 65, "question": "Which Kubernetes object defines rules about how Pods are allowed to communicate with each other and network endpoints?", "options": {"A": "Service", "B": "Ingress", "C": "NetworkPolicy", "D": "SecurityContext"}, "answer": "C", "explanation": "NetworkPolicies allow specifying traffic flow rules at the IP address or port level (OSI layer 3 or 4).", "domain": "Container Orchestration", "competency": "Networking"}, {"id": 66, "question": "What is the primary purpose of a Service Mesh like Istio or Linkerd?", "options": {"A": "Container image building", "B": "Cluster storage management", "C": "Managing inter-service comms", "D": "Node provisioning"}, "answer": "C", "explanation": "Service meshes add observability, security, and reliability features to communication between microservices (service-to-service).", "domain": "Container Orchestration", "competency": "Service Mesh"}, {"id": 67, "question": "What Kubernetes object represents a piece of storage in the cluster, provisioned by an administrator or dynamically?", "options": {"A": "PersistentVolumeClaim (PVC)", "B": "StorageClass", "C": "PersistentVolume (PV)", "D": "Volume"}, "answer": "C", "explanation": "A PersistentVolume (PV) is a piece of storage provisioned for use in the cluster, independent of any individual Pod.", "domain": "Container Orchestration", "competency": "Storage"}, {"id": 68, "question": "What does a PersistentVolumeClaim (PVC) represent in Kubernetes?", "options": {"A": "A request for storage by a user", "B": "A type of storage backend", "C": "A node&#x27;s local storage", "D": "A backup of a volume"}, "answer": "A", "explanation": "A PVC is a request made by a user (or Pod) for storage resources defined by a PV.", "domain": "Container Orchestration", "competency": "Storage"}, {"id": 69, "question": "What is the function of a StorageClass in Kubernetes?", "options": {"A": "To define types of storage", "B": "To claim a specific PV", "C": "To attach storage to a Pod", "D": "To backup volume data"}, "answer": "A", "explanation": "StorageClasses allow administrators to define different &quot;classes&quot; of storage (e.g., &#x27;fast-ssd&#x27;, &#x27;cheap-hdd&#x27;) for dynamic provisioning.", "domain": "Container Orchestration", "competency": "Storage"}, {"id": 70, "question": "Which mechanism allows Kubernetes to automatically adjust the number of Pods in a Deployment based on CPU utilization or custom metrics?", "options": {"A": "Vertical Pod Autoscaler (VPA)", "B": "Cluster Autoscaler (CA)", "C": "Horizontal Pod Autoscaler (HPA)", "D": "Node Problem Detector (NPD)"}, "answer": "C", "explanation": "The HPA automatically scales the number of Pod replicas based on observed metrics like CPU or memory usage.", "domain": "Cloud Native Architecture", "competency": "Autoscaling"}, {"id": 71, "question": "What is the primary goal of the Cluster Autoscaler?", "options": {"A": "Scale Pod replicas", "B": "Scale cluster Nodes", "C": "Scale Persistent Volumes", "D": "Scale Service endpoints"}, "answer": "B", "explanation": "The Cluster Autoscaler adjusts the number of Nodes in the cluster based on pending Pods that cannot be scheduled due to resource limits.", "domain": "Cloud Native Architecture", "competency": "Autoscaling"}, {"id": 72, "question": "What term describes an architectural approach where applications are built as small, independent services that run in their own processes?", "options": {"A": "Monolithic", "B": "Microservices", "C": "Serverless", "D": "N-Tier"}, "answer": "B", "explanation": "Microservices architecture structures an application as a collection of loosely coupled, independently deployable services.", "domain": "Cloud Native Architecture", "competency": "Cloud Native Principles"}, {"id": 73, "question": "What does &quot;Serverless&quot; computing primarily abstract away from the developer?", "options": {"A": "Networking", "B": "Storage", "C": "Server Management", "D": "Operating System choice"}, "answer": "C", "explanation": "Serverless platforms (like FaaS) manage the underlying infrastructure, allowing developers to focus solely on code execution.", "domain": "Cloud Native Architecture", "competency": "Serverless"}, {"id": 74, "question": "Which organization hosts Kubernetes and promotes the growth of the cloud native ecosystem?", "options": {"A": "Linux Foundation (LF)", "B": "Apache Software Foundation (ASF)", "C": "Cloud Native Computing Foundation (CNCF)", "D": "Open Source Initiative (OSI)"}, "answer": "C", "explanation": "The CNCF, part of the Linux Foundation, stewards Kubernetes and many other cloud native projects.", "domain": "Cloud Native Architecture", "competency": "Community and Governance"}, {"id": 75, "question": "What is the benefit of using open standards in cloud native technologies?", "options": {"A": "Vendor lock-in", "B": "Increased complexity", "C": "Interoperability &amp; Portability", "D": "Reduced security"}, "answer": "C", "explanation": "Open standards (like OCI, CRI, CNI) ensure that different tools and platforms can work together, preventing vendor lock-in.", "domain": "Cloud Native Architecture", "competency": "Open Standards"}, {"id": 76, "question": "In a typical cloud native environment, which persona is primarily responsible for designing and building the application?", "options": {"A": "Operator", "B": "Developer", "C": "Site Reliability Engineer (SRE)", "D": "Security Engineer"}, "answer": "B", "explanation": "Developers focus on writing, building, and testing the application code that runs within the cloud native platform.", "domain": "Cloud Native Architecture", "competency": "Roles and Personas"}, {"id": 77, "question": "Which persona is typically focused on the reliability, scalability, and maintenance of the underlying Kubernetes platform?", "options": {"A": "End User", "B": "Application Developer", "C": "Platform Operator / SRE", "D": "Data Scientist"}, "answer": "C", "explanation": "Operators or SREs manage the Kubernetes cluster itself, ensuring it&#x27;s healthy, scalable, and available for developers.", "domain": "Cloud Native Architecture", "competency": "Roles and Personas"}, {"id": 78, "question": "What are the three pillars of observability in cloud native systems?", "options": {"A": "Alerts, Dashboards, Reports", "B": "Logs, Metrics, Traces", "C": "Monitoring, Logging, Profiling", "D": "Scaling, Scheduling, Storing"}, "answer": "B", "explanation": "Logs (events), Metrics (measurements over time), and Traces (request flows) are considered the fundamental pillars of observability.", "domain": "Cloud Native Observability", "competency": "Telemetry &amp; Observability"}, {"id": 79, "question": "What type of telemetry data records discrete events that happened at a specific time?", "options": {"A": "Metrics", "B": "Traces", "C": "Logs", "D": "Profiles"}, "answer": "C", "explanation": "Logs provide timestamped records of events, often used for debugging or auditing.", "domain": "Cloud Native Observability", "competency": "Telemetry &amp; Observability"}, {"id": 80, "question": "What type of telemetry data represents a measurement sampled over time, often aggregated?", "options": {"A": "Metrics", "B": "Traces", "C": "Logs", "D": "Events"}, "answer": "A", "explanation": "Metrics are numerical values tracked over time (e.g., CPU usage, request count) used for monitoring trends and performance.", "domain": "Cloud Native Observability", "competency": "Telemetry &amp; Observability"}, {"id": 81, "question": "What type of telemetry data shows the path and duration of a request as it flows through multiple services?", "options": {"A": "Metrics", "B": "Traces", "C": "Logs", "D": "Alerts"}, "answer": "B", "explanation": "Traces (specifically distributed traces) track a request&#x27;s journey across different microservices, identifying bottlenecks.", "domain": "Cloud Native Observability", "competency": "Telemetry &amp; Observability"}, {"id": 82, "question": "Which open-source monitoring system, graduated by the CNCF, is widely used for collecting and querying time-series metrics in Kubernetes?", "options": {"A": "Grafana", "B": "Jaeger", "C": "Prometheus", "D": "Fluentd"}, "answer": "C", "explanation": "Prometheus is the de facto standard for metrics collection and alerting in the Kubernetes ecosystem.", "domain": "Cloud Native Observability", "competency": "Prometheus"}, {"id": 83, "question": "How does Prometheus typically gather metrics from applications and infrastructure?", "options": {"A": "Pushing metrics to endpoints", "B": "Pulling metrics via scraping", "C": "Reading log files directly", "D": "Using kernel probes"}, "answer": "B", "explanation": "Prometheus operates on a pull model, periodically scraping HTTP endpoints exposed by targets (applications, exporters) for metrics.", "domain": "Cloud Native Observability", "competency": "Prometheus"}, {"id": 84, "question": "What language is used to write queries in Prometheus?", "options": {"A": "SQL", "B": "PromQL", "C": "JSONPath", "D": "YAML"}, "answer": "B", "explanation": "PromQL (Prometheus Query Language) is the powerful functional query language used to select and aggregate time series data.", "domain": "Cloud Native Observability", "competency": "Prometheus"}, {"id": 85, "question": "In cloud native cost management, what does &quot;FinOps&quot; primarily focus on?", "options": {"A": "Optimizing application code", "B": "Managing cloud spending", "C": "Improving network security", "D": "Automating deployments"}, "answer": "B", "explanation": "FinOps is a cultural practice and framework that brings financial accountability to the variable spend model of the cloud.", "domain": "Cloud Native Observability", "competency": "Cost Management"}, {"id": 86, "question": "Why can cost management be challenging in Kubernetes environments?", "options": {"A": "Lack of monitoring tools", "B": "Shared resources &amp; dynamic workloads", "C": "Fixed infrastructure costs", "D": "Infrequent deployments"}, "answer": "B", "explanation": "The shared nature of cluster resources and the dynamic scaling of workloads make it difficult to attribute costs accurately.", "domain": "Cloud Native Observability", "competency": "Cost Management"}, {"id": 87, "question": "What is the practice of using Git repositories as the single source of truth for defining and managing infrastructure and applications?", "options": {"A": "CI/CD", "B": "DevOps", "C": "GitOps", "D": "Infrastructure as Code (IaC)"}, "answer": "C", "explanation": "GitOps leverages Git&#x27;s features (versioning, history, PRs) to manage infrastructure and application deployment declaratively.", "domain": "Cloud Native Application Delivery", "competency": "GitOps"}, {"id": 88, "question": "Which core principle differentiates GitOps from general Infrastructure as Code (IaC)?", "options": {"A": "Using code for infra config", "B": "Automating infrastructure tests", "C": "Using Git as the source of truth", "D": "Manual deployment approval"}, "answer": "C", "explanation": "While IaC uses code, GitOps specifically mandates Git as the declarative source of truth and uses agents to enforce that state.", "domain": "Cloud Native Application Delivery", "competency": "GitOps"}, {"id": 89, "question": "What does &quot;CI&quot; stand for in the context of application delivery?", "options": {"A": "Continuous Integration", "B": "Cluster Infrastructure", "C": "Container Interface", "D": "Cloud Instance"}, "answer": "A", "explanation": "Continuous Integration involves frequently merging code changes into a central repository, followed by automated builds and tests.", "domain": "Cloud Native Application Delivery", "competency": "CI/CD"}, {"id": 90, "question": "What does &quot;CD&quot; stand for in CI/CD?", "options": {"A": "Container Deployment", "B": "Continuous Delivery/Deployment", "C": "Cluster Discovery", "D": "Centralized Dashboard"}, "answer": "B", "explanation": "Continuous Delivery ensures code changes can be released quickly, while Continuous Deployment automatically deploys them to production.", "domain": "Cloud Native Application Delivery", "competency": "CI/CD"}, {"id": 91, "question": "Which stage in a typical CI/CD pipeline for Kubernetes usually involves creating a container image?", "options": {"A": "Testing", "B": "Building", "C": "Deployment", "D": "Monitoring"}, "answer": "B", "explanation": "The build stage compiles code (if necessary) and packages the application and its dependencies into a container image (e.g., Docker).", "domain": "Cloud Native Application Delivery", "competency": "CI/CD"}, {"id": 92, "question": "Which tool is commonly used in CI/CD pipelines to automate the build, test, and deployment processes?", "options": {"A": "Kubernetes", "B": "Docker", "C": "Jenkins / GitLab CI / GitHub Actions", "D": "Prometheus"}, "answer": "C", "explanation": "Tools like Jenkins, GitLab CI, GitHub Actions, Argo CD, Flux etc., orchestrate the steps within a CI/CD pipeline.", "domain": "Cloud Native Application Delivery", "competency": "CI/CD"}, {"id": 93, "question": "What is the primary goal of Application Delivery in a cloud native context?", "options": {"A": "To secure the cluster", "B": "To monitor resource usage", "C": "To reliably deploy &amp; manage apps", "D": "To provision infrastructure"}, "answer": "C", "explanation": "Application delivery focuses on the processes and tools used to get applications running reliably and efficiently in the environment.", "domain": "Cloud Native Application Delivery", "competency": "Application Delivery Fundamentals"}, {"id": 94, "question": "In Kubernetes RBAC (Role-Based Access Control), what defines a set of permissions?", "options": {"A": "Role / ClusterRole", "B": "ServiceAccount", "C": "RoleBinding / ClusterRoleBinding", "D": "User"}, "answer": "A", "explanation": "A Role (namespace-scoped) or ClusterRole (cluster-scoped) contains rules that represent a set of permissions on resources.", "domain": "Container Orchestration", "competency": "Security"}, {"id": 95, "question": "What object binds a Role or ClusterRole to a user, group, or ServiceAccount?", "options": {"A": "Secret", "B": "ConfigMap", "C": "NetworkPolicy", "D": "RoleBinding / ClusterRoleBinding"}, "answer": "D", "explanation": "A RoleBinding (namespace-scoped) or ClusterRoleBinding (cluster-scoped) grants the permissions defined in a Role/ClusterRole to subjects.", "domain": "Container Orchestration", "competency": "Security"}, {"id": 96, "question": "If you need a Pod to run on every single Node in the cluster (or a subset), which controller is most suitable?", "options": {"A": "Deployment", "B": "StatefulSet", "C": "DaemonSet", "D": "Job"}, "answer": "C", "explanation": "DaemonSets ensure that all (or some) Nodes run a copy of a Pod, useful for cluster services like log collectors or node monitors.", "domain": "Kubernetes Fundamentals", "competency": "Kubernetes Resources"}, {"id": 97, "question": "What is a primary difference between a Deployment and a StatefulSet?", "options": {"A": "StatefulSets manage Pods", "B": "Deployments are for databases", "C": "StatefulSets provide stable IDs", "D": "Deployments use PVs"}, "answer": "C", "explanation": "StatefulSets provide guarantees about the ordering and uniqueness of Pods, including stable network identifiers and persistent storage.", "domain": "Kubernetes Fundamentals", "competency": "Kubernetes Resources"}, {"id": 98, "question": "Which Kubernetes API object is used to manage external access to services in a cluster, typically HTTP/S?", "options": {"A": "Service (LoadBalancer type)", "B": "NodePort Service", "C": "Ingress", "D": "ExternalName Service"}, "answer": "C", "explanation": "Ingress provides HTTP/S routing rules to manage external users&#x27; access to services within the cluster based on hostnames or paths.", "domain": "Container Orchestration", "competency": "Networking"}, {"id": 99, "question": "What design pattern involves running an additional container within a Pod to provide auxiliary functions (like logging or monitoring) to the main application container?", "options": {"A": "Init Container", "B": "Sidecar Container", "C": "Ephemeral Container", "D": "Job Container"}, "answer": "B", "explanation": "The Sidecar pattern adds helper containers alongside the main application container within the same Pod network/storage namespace.", "domain": "Kubernetes Fundamentals", "competency": "Containers"}, {"id": 100, "question": "What fundamental concept allows Kubernetes to maintain the desired state declared by the user?", "options": {"A": "Imperative Commands", "B": "Control Loop / Reconciliation", "C": "Manual Scaling", "D": "Direct Node Access"}, "answer": "B", "explanation": "Kubernetes controllers operate on control loops, constantly comparing the desired state (from API objects) with the actual cluster state.", "domain": "Kubernetes Fundamentals", "competency": "Kubernetes Architecture"}];

const state = {
  started:false,
  filterMode:'none',
  domain:'',
  competency:'',
  search:'',
  count:20,
  shuffle:true,
  pool:[],
  quiz:[],
  idx:0,
  score:0,
  answers:[] // {picked, correct}
};

function uniq(arr){ return Array.from(new Set(arr.filter(Boolean))).sort(); }
function shuf(a){ const x=a.slice(); for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];} return x; }

const domains = uniq(DATA.map(q=>q.domain));
const competencies = uniq(DATA.map(q=>q.competency));

const left = document.getElementById('left');
const right = document.getElementById('right');
const pill = document.getElementById('pillCount');
document.getElementById('btnReset').onclick = ()=>{ reset(); render(); };

function reset(){ state.started=false; state.idx=0; state.score=0; state.answers=[]; buildPool(); }
function buildPool(){
  let p = DATA;
  if(state.filterMode==='domain' && state.domain) p = p.filter(x => (x.domain||'').toLowerCase()===state.domain.toLowerCase());
  if(state.filterMode==='competency' && state.competency) p = p.filter(x => (x.competency||'').toLowerCase()===state.competency.toLowerCase());
  if(state.filterMode==='search' && state.search.trim()){
    const n = state.search.toLowerCase();
    p = p.filter(x => (x.question||'').toLowerCase().includes(n) ||
                      Object.values(x.options||{}).some(v => (v||'').toLowerCase().includes(n)) ||
                      (x.explanation||'').toLowerCase().includes(n));
  }
  state.pool = p;
  pill.textContent = DATA.length + ' questions';
}

function start(){
  let arr = state.pool.slice();
  if(state.shuffle) arr = shuf(arr);
  state.quiz = arr.slice(0, Math.min(state.count, arr.length));
  state.idx=0; state.score=0; state.answers=[]; state.started=true;
  render();
}

function pick(letter){
  const q = state.quiz[state.idx];
  if(!q) return;
  const ansLetter = (q.answer||'').toString().trim().toUpperCase() || null;
  const graded = !!ansLetter && q.options && q.options[ansLetter];
  if(state.answers[state.idx]) return;
  const isCorrect = graded ? (letter===ansLetter) : null;
  state.answers[state.idx] = {picked:letter, correct:isCorrect};
  if(isCorrect===true) state.score += 1;
  render();
}

function nextQ(){ if(state.idx < state.quiz.length-1){ state.idx += 1; render(); } else { state.started=false; render(); } }
function gotoIdx(i){ state.idx = i; render(); }

function progressHTML(){
  const pct = state.quiz.length ? Math.round(((state.idx + (state.answers[state.idx]?1:0)) / state.quiz.length) * 100) : 0;
  return '<div class="progress"><div class="bar" style="width:'+pct+'%"></div></div>';
}

function optionBtn(letter, text, q, ans){
  const ansLetter = (q.answer||'').toString().trim().toUpperCase() || null;
  const graded = !!ansLetter && q.options && q.options[ansLetter];
  let cls = 'opt';
  if(ans){
    if(graded){
      if(letter===ansLetter) cls += ' correct';
      else if(ans.picked===letter) cls += ' wrong';
      else cls += ' disabled';
    }else{
      cls += ' disabled';
    }
  }
  return '<button class="'+cls+'" onclick="pick(\''+letter+'\')"><b>'+letter+'.</b> '+text+'</button>';
}

function renderStart(){
  right.innerHTML = [
    '<h3 style="margin:0 0 8px;font-weight:600">About</h3>',
    '<p class="sub">Choose a filter, set question count, answer to get instant feedback and explanations.</p>',
    '<div class="sub"><span class="pill" style="margin-right:6px">'+domains.length+' domains</span>',
    '<span class="pill">'+competencies.length+' competencies</span></div>'
  ].join('');

  const dyn = (state.filterMode==='domain') ? (
    '<label>Domain</label><select id="domSel" class="mt-1"><option value="">— Select —</option>'+domains.map(d=>'<option>'+d+'</option>').join('')+'</select>'
  ) : (state.filterMode==='competency') ? (
    '<label>Competency</label><select id="compSel" class="mt-1"><option value="">— Select —</option>'+competencies.map(c=>'<option>'+c+'</option>').join('')+'</select>'
  ) : (state.filterMode==='search') ? (
    '<label>Search</label><input id="searchInp" class="mt-1" placeholder="Type keywords…">'
  ) : '';

  left.innerHTML = [
    '<div style="color:#475569;margin-bottom:10px">Filters</div>',
    '<div class="tiles" style="grid-template-columns:repeat(2,minmax(0,1fr))">',
      '<div>',
        '<label>Filter mode</label>',
        '<select id="modeSel" class="mt-1">',
          '<option value="none">None</option>',
          '<option value="domain">By Domain</option>',
          '<option value="competency">By Competency</option>',
          '<option value="search">Search text</option>',
        '</select>',
      '</div>',
      '<div id="dynWrap">'+dyn+'</div>',
      '<div>',
        '<label>Number of questions</label>',
        '<input id="countInp" type="number" class="mt-1" min="5" max="'+(state.pool.length||50)+'" value="'+state.count+'">',
        '<div class="sub" style="margin-top:6px">Available in pool: '+state.pool.length+'</div>',
      '</div>',
      '<div style="display:flex;align-items:center;gap:8px;margin-top:8px">',
        '<input id="shuffleChk" type="checkbox" '+(state.shuffle?'checked':'')+'>',
        '<label>Shuffle questions</label>',
      '</div>',
    '</div>',
    '<button id="btnStart" class="btn primary" style="margin-top:12px" '+(state.pool.length===0?'disabled':'')+'>Start Quiz</button>'
  ].join('');

  document.getElementById('modeSel').value = state.filterMode;
  document.getElementById('modeSel').onchange = (e)=>{ state.filterMode = e.target.value; buildPool(); render(); };

  if(state.filterMode==='domain'){
    const sel = document.getElementById('domSel');
    sel.value = state.domain;
    sel.onchange = ()=>{ state.domain = sel.value; buildPool(); render(); };
  }else if(state.filterMode==='competency'){
    const sel = document.getElementById('compSel');
    sel.value = state.competency;
    sel.onchange = ()=>{ state.competency = sel.value; buildPool(); render(); };
  }else if(state.filterMode==='search'){
    const inp = document.getElementById('searchInp');
    inp.value = state.search;
    inp.oninput = ()=>{ state.search = inp.value; buildPool(); };
  }

  document.getElementById('countInp').onchange = (e)=>{ state.count = Math.max(5, parseInt(e.target.value||'20',10)); };
  document.getElementById('shuffleChk').onchange = (e)=>{ state.shuffle = e.target.checked; };
  document.getElementById('btnStart').onclick = start;
}

function renderQuiz(){
  const q = state.quiz[state.idx];
  const ans = state.answers[state.idx];
  const ansLetter = (q.answer||'').toString().trim().toUpperCase() || null;
  const graded = !!ansLetter && q.options && q.options[ansLetter];
  const isLast = state.idx === state.quiz.length - 1;

  left.innerHTML = [
    '<div style="display:flex;justify-content:space-between;align-items:center">',
      '<span class="pill">Question '+(state.idx+1)+' of '+state.quiz.length+'</span>',
      progressHTML(),
    '</div>',
    '<h2 style="font-size:18px;margin:12px 0 8px;font-weight:600">'+q.question+'</h2>',
    (q.domain?'<span class="pill" style="margin-right:6px">Domain: '+q.domain+'</span>':''),
    (q.competency?'<span class="pill">Competency: '+q.competency+'</span>':''),
    '<div class="options" style="margin-top:10px">',
      Object.entries(q.options||{}).map(([L,T])=>optionBtn(L,T,q,ans)).join(''),
    '</div>',
    (ans?('<div class="card" style="padding:12px;margin-top:10px">'+(graded?(ans.correct?'<b style="color:#16a34a">Correct!</b>':'<b style="color:#dc2626">Incorrect.</b> Correct answer: <b>'+ansLetter+'</b>'):'<b>Study mode:</b> no official answer provided.')+(q.explanation?'<div class="sub" style="margin-top:6px">'+q.explanation+'</div>':'')+'</div>'):'') ,
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">',
      '<div class="sub">Score: '+state.score+' / '+state.quiz.length+'</div>',
      (!isLast?'<button class="btn" '+(!ans?'disabled':'')+' onclick="nextQ()">Next</button>':'<button class="btn primary" onclick="finish()">Finish</button>'),
    '</div>'
  ].join('');

  right.innerHTML = [
    '<h3 style="margin:0 0 8px;font-weight:600">Quick review</h3>',
    '<div class="tiles">',
      state.quiz.map((item, i)=>'<button class="tile '+(i===state.idx?'active':'')+'" onclick="gotoIdx('+i+')">Q'+(i+1)+'<br><span class="sub">'+(item.question||'').slice(0,42)+'…</span></button>').join(''),
    '</div>'
  ].join('');
}

function finish(){ state.started=false; render(); }

function render(){
  buildPool();
  if(!state.started) renderStart();
  else renderQuiz();
}

// Expose some functions
window.pick = pick;
window.nextQ = nextQ;
window.gotoIdx = gotoIdx;
window.finish = finish;

reset();
render();
</script>
</body>
</html>
