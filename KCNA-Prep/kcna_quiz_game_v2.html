 users.", "C": "Providing automatic mutual TLS (mTLS) between all services in the mesh.", "D": "Scanning Pods for known vulnerabilities.", "E": "Managing firewall rules at the cluster&#x27;s edge."}, "answer": "C", "explanation": "A key feature of many Service Meshes is the ability to automatically establish and enforce mTLS for all traffic between services in the mesh. This encrypts traffic and ensures that services mutually authenticate each other, a core tenet of zero-trust networking.", "domain": null, "competency": "Service Mesh"}, {"id": 17, "question": "What does &quot;event-driven&quot; architecture, often associated with serverless functions, mean?", "options": {"A": "Applications must be written using event sourcing patterns.", "B": "Code execution is triggered by the occurrence of specific events (e.g., HTTP request, message).", "C": "The platform uses events internally for scheduling, hidden from the user.", "D": "All application state must be stored within the event payload.", "E": "Only asynchronous communication patterns can be used."}, "answer": "B", "explanation": "In an event-driven model, components react to events. Serverless functions are often designed this way: an event occurs (like an API call, a file upload, a database change), and the platform triggers the corresponding function to process that event.", "domain": null, "competency": "Serverless"}, {"id": 17, "question": "What is a potential challenge or consideration when implementing GitOps?", "options": {"A": "It makes rollbacks significantly more difficult than traditional methods.", "B": "It requires developers to have direct kubectl apply access to production clusters.", "C": "Managing secrets securely within a Git-based workflow requires careful handling (e.g., using sealed secrets, external secret managers).", "D": "It eliminates the need for any CI pipeline processes like building and testing.", "E": "It only works with specific proprietary Git hosting providers."}, "answer": "C", "explanation": "Storing plain-text secrets in Git is a major security risk. GitOps workflows require solutions to manage secrets safely, such as encrypting them in Git (e.g., Sealed Secrets, SOPS) and decrypting them only within the cluster, or fetching them from external secret management systems (e.g., HashiCorp Vault, AWS Secrets Manager).", "domain": null, "competency": "GitOps"}, {"id": 17, "question": "What is the primary function of etcd within the Kubernetes architecture?", "options": {"A": "To run the container runtime interface", "B": "To schedule Pods across available nodes", "C": "To provide reliable, distributed storage for cluster state and configuration", "D": "To manage network policies and ingress rules", "E": "To execute health checks against running containers"}, "answer": "C", "explanation": "etcd is the consistent key-value store that acts as the source of truth for the entire cluster. All configuration, state, and metadata are persisted here, ensuring consistency across the control plane.", "domain": null, "competency": "Kubernetes Architecture"}, {"id": 17, "question": "What type of Prometheus metric is most suitable for tracking a value that can arbitrarily increase or decrease, like the current number of active connections?", "options": {"A": "Counter", "B": "Gauge", "C": "Histogram", "D": "Summary", "E": "Info"}, "answer": "B", "explanation": "A Gauge represents a single numerical value that can go up or down. It&#x27;s suitable for metrics like temperature, current memory usage, or the number of items in a queue. Counters only go up (or reset to zero). Histograms and Summaries track distributions.", "domain": null, "competency": "Prometheus"}, {"id": 18, "question": "How does the CNCF promote cloud native principles and best practices within the community?", "options": {"A": "By mandating the use of specific programming languages for hosted projects.", "B": "By selling proprietary tools that enforce best practices.", "C": "Through publications (e.g., blog, reports), webinars, events (like KubeCon), and fostering collaboration.", "D": "By directly managing the infrastructure for all member companies.", "E": "By providing legally binding architectural blueprints."}, "answer": "C", "explanation": "CNCF acts as a thought leader and community hub. It shares knowledge and promotes best practices through various channels like its website, blog, webinars, research papers, landscape map, and major conferences like KubeCon + CloudNativeCon.", "domain": null, "competency": "Community and Governance"}, {"id": 18, "question": "The Container Storage Interface (CSI) was developed to address what challenge in Kubernetes storage?", "options": {"A": "To provide a standard for defining StorageClass parameters.", "B": "To enable third-party storage vendors to develop plugins without modifying core Kubernetes code.", "C": "To improve the performance of hostPath volumes.", "D": "To automate the backup and restore of PersistentVolumes.", "E": "To define how containers should access configuration data."}, "answer": "B", "explanation": "CSI is a standard for exposing block and file storage systems to containerized workloads. It allows storage vendors to create plugins that integrate with Kubernetes (and other orchestrators) to manage storage lifecycles, without needing their code to be part of the Kubernetes core.", "domain": null, "competency": "Storage"}, {"id": 18, "question": "What is &quot;pipeline-as-code&quot; in the context of CI/CD?", "options": {"A": "Writing application code directly within the CI/CD tool&#x27;s UI.", "B": "Defining the CI/CD pipeline&#x27;s stages, steps, and configuration using code stored in version control (e.g., Jenkinsfile, GitLab CI YAML).", "C": "Generating pipeline definitions automatically based on monitoring data.", "D": "A specific programming language used exclusively for writing CI/CD pipelines.", "E": "Storing pipeline execution logs as application code."}, "answer": "B", "explanation": "Pipeline-as-code treats the definition of the build, test, and deployment pipeline itself as code. This definition lives in version control alongside the application code, enabling versioning, review, and easier management of the pipeline&#x27;s structure and logic.", "domain": null, "competency": "CI/CD"}, {"id": 18, "question": "What is the primary role of the Cloud Native Computing Foundation (CNCF) in the Kubernetes ecosystem?", "options": {"A": "To directly employ Kubernetes core developers", "B": "To sell Kubernetes enterprise support subscriptions", "C": "To foster and sustain an ecosystem of open source projects", "D": "To define mandatory cloud provider APIs", "E": "To own the intellectual property of Linux"}, "answer": "C", "explanation": "The CNCF hosts and promotes a wide range of open source projects (including Kubernetes, Prometheus, Envoy) to advance cloud native computing, providing governance, support, and community building.", "domain": "Cloud Native Architecture", "competency": "Community and Governance"}, {"id": 18, "question": "Which field in a Pod&#x27;s specification is crucial for the kube-scheduler to determine if a node has sufficient resources?", "options": {"A": "spec.nodeName", "B": "spec.containers[].ports", "C": "spec.containers[].resources.requests", "D": "spec.serviceAccountName", "E": "spec.restartPolicy"}, "answer": "C", "explanation": "The resources.requests field (for CPU and memory) indicates the minimum amount of resources the container needs. The scheduler uses this to filter out nodes that cannot meet these requests.", "domain": null, "competency": "Scheduling"}, {"id": 18, "question": "Why is tagging or labeling resources (e.g., Pods, Nodes, cloud resources) crucial for effective cost management in a shared cloud-native environment?", "options": {"A": "It improves the performance of the Kubernetes scheduler.", "B": "It allows cost allocation and analysis based on specific teams, projects, or environments.", "C": "It automatically encrypts data associated with the tagged resources.", "D": "It enables the use of Vertical Pod Autoscaler (VPA).", "E": "It increases the fault tolerance of the control plane."}, "answer": "B", "explanation": "In shared environments, costs are aggregated. Consistent tagging/labeling allows organizations to filter cost and usage data (often provided by cloud providers or third-party tools) to understand how much each project, team, environment, or application is contributing to the overall cloud spend.", "domain": null, "competency": "Cost Management"}, {"id": 19, "question": "A Site Reliability Engineer (SRE) working with a Kubernetes platform would likely focus most on which area?", "options": {"A": "Designing the user interface for end-user applications.", "B": "Automating platform operations, ensuring reliability/SLOs, and managing incident response.", "C": "Writing feature code for the core business applications running on the platform.", "D": "Defining the marketing strategy for the company&#x27;s cloud native services.", "E": "Choosing which programming language application developers should use."}, "answer": "B", "explanation": "SREs apply software engineering principles to infrastructure and operations problems. They focus on automating tasks, measuring and meeting Service Level Objectives (SLOs) for platform reliability, improving monitoring/alerting, and handling incidents efficiently.", "domain": null, "competency": "Roles and Personas"}, {"id": 19, "question": "Grafana is often used alongside Prometheus. What is Grafana&#x27;s primary role in this context?", "options": {"A": "To store long-term metrics data collected by Prometheus.", "B": "To generate alerts based on Prometheus metrics.", "C": "To provide data visualization and dashboarding for Prometheus metrics (and other sources).", "D": "To replace the Prometheus server for scraping targets.", "E": "To manage Prometheus configuration files."}, "answer": "C", "explanation": "Grafana is a popular open-source visualization platform. It excels at querying data sources like Prometheus and displaying the time-series data in flexible, interactive dashboards with various graph types, tables, and alerts (though Alertmanager is Prometheus&#x27;s native alerter).", "domain": null, "competency": "Telemetry &amp; Observability"}, {"id": 19, "question": "How does the concept of &quot;least privilege&quot; apply to GitOps operators?", "options": {"A": "The operator should run with cluster-admin privileges for maximum flexibility.", "B": "The operator&#x27;s permissions (e.g., via ServiceAccount and RBAC) should be scoped only to the resources it needs to manage.", "C": "Developers interacting with Git should have least privilege; the operator needs full access.", "D": "The operator should only have read-only access to the Git repository.", "E": "Least privilege only applies to CI/CD tools, not GitOps operators."}, "answer": "B", "explanation": "For security, the GitOps operator running in the cluster should be granted only the minimum RBAC permissions required to manage the specific resources defined in its target Git repositories and namespaces. Granting cluster-admin privileges unnecessarily increases the potential blast radius if compromised.", "domain": null, "competency": "GitOps"}, {"id": 19, "question": "In a typical cloud native environment, which persona is most concerned with ensuring application uptime, performance, and managing incident response?", "options": {"A": "Application Developer", "B": "Platform Consumer", "C": "Site Reliability Engineer (SRE) / Platform Operator", "D": "Business Analyst", "E": "End User"}, "answer": "C", "explanation": "SREs and Platform Operators are responsible for the reliability, scalability, and overall operational health of the platform and the applications running on it, including monitoring, alerting, and incident management.", "domain": "Cloud Native Architecture", "competency": "Roles and Personas"}, {"id": 19, "question": "What fundamental concept allows Kubernetes controllers to operate effectively without needing constant instructions?", "options": {"A": "Imperative command execution", "B": "The reconciliation loop (Control Loop)", "C": "Direct manipulation of etcd", "D": "Event-driven webhooks", "E": "Stateful session management"}, "answer": "B", "explanation": "Controllers continuously watch the desired state (from the API server) and the current state (observed in the cluster), taking actions (via the API server) to make the current state match the desired state. This is the core principle of Kubernetes automation.", "domain": null, "competency": "Kubernetes Architecture"}, {"id": 19, "question": "Which of these is NOT a typical benefit of using a container orchestrator for managing applications?", "options": {"A": "Improved resource utilization through bin packing.", "B": "Simplified application code logic for handling infrastructure failures.", "C": "Abstracted underlying infrastructure differences.", "D": "Automatic conversion of monolithic applications to microservices.", "E": "Enhanced scalability and availability of applications."}, "answer": "D", "explanation": "Orchestrators help deploy and manage microservices (and even well-architected monoliths), but they do not automatically refactor or convert application code from a monolithic architecture to a microservices architecture. That&#x27;s a software design and development effort.", "domain": null, "competency": "Container Orchestration Fundamentals"}, {"id": 20, "question": "What does the rate() function in PromQL typically calculate?", "options": {"A": "The total count of a metric over a time range.", "B": "The average value of a gauge metric over a time range.", "C": "The per-second average rate of increase for a counter metric over a time range.", "D": "The 95th percentile value of a histogram metric.", "E": "The current value of a metric label."}, "answer": "C", "explanation": "Counters continuously increase. rate() calculates how fast a counter is increasing per second, averaged over a specified time window. This is essential for understanding throughput or frequency of events (e.g., HTTP requests per second, errors per second).", "domain": null, "competency": "Prometheus"}, {"id": 20, "question": "What is a key characteristic of runc, often used by higher-level runtimes like containerd?", "options": {"A": "It&#x27;s a full-fledged container orchestrator.", "B": "It provides a command-line tool for building OCI-compliant images.", "C": "It&#x27;s a low-level OCI runtime responsible for spawning and running containers.", "D": "It&#x27;s a CNI plugin for configuring Pod networking.", "E": "It&#x27;s a distributed key-value store for container metadata."}, "answer": "C", "explanation": "runc is a CLI tool for spawning and running containers according to the OCI specification. Higher-level runtimes like containerd use runc (or similar OCI runtimes) under the hood to actually execute the containers.", "domain": null, "competency": "Runtime"}, {"id": 20, "question": "What is the purpose of tools like Helm or Kustomize in Kubernetes application delivery?", "options": {"A": "To replace the need for container image registries.", "B": "To provide runtime monitoring and alerting for applications.", "C": "To manage, template, and customize Kubernetes manifest files, simplifying complex deployments.", "D": "To automatically write application source code based on high-level requirements.", "E": "To enforce network security policies between Pods."}, "answer": "C", "explanation": "Deploying applications often involves many related Kubernetes manifests. Helm (packaging/templating) and Kustomize (overlay-based customization) help manage this complexity, allowing for parameterization, reuse, and environment-specific configuration without duplicating large amounts of YAML.", "domain": null, "competency": "CI/CD"}, {"id": 20, "question": "Which OCI (Open Container Initiative) specification defines how container runtimes should execute containers?", "options": {"A": "Image Specification", "B": "Distribution Specification", "C": "Runtime Specification (CRI is Kubernetes&#x27; interface to this)", "D": "Network Specification (CNI is related)", "E": "Storage Specification"}, "answer": "C", "explanation": "The OCI Runtime Specification outlines how to run a container filesystem bundle. Kubernetes uses the Container Runtime Interface (CRI) as an abstraction layer over runtimes like containerd or CRI-O that implement this standard.", "domain": null, "competency": "Containers"}, {"id": 20, "question": "Why are Open Standards, like those defined by the Open Container Initiative (OCI), critical for the cloud native ecosystem?", "options": {"A": "They guarantee better application performance", "B": "They enforce specific vendor implementations", "C": "They promote interoperability and prevent vendor lock-in", "D": "They reduce the need for security patching", "E": "They simplify the user interface of cloud platforms"}, "answer": "C", "explanation": "Open standards (e.g., OCI for container formats/runtimes, CNI for networking, CRI for runtimes) ensure that different tools and platforms can work together seamlessly, giving users choice and preventing vendor lock-in.", "domain": "Cloud Native Architecture", "competency": "Open Standards"}, {"id": 20, "question": "Why is the standardization provided by specifications like CRI (Container Runtime Interface) important for Platform Operators/SREs?", "options": {"A": "It allows them to use docker build commands to manage runtime configuration.", "B": "It simplifies the process of writing application code for developers.", "C": "It gives them flexibility to choose/swap runtimes without disrupting Kubernetes functionality.", "D": "It guarantees that all container runtimes will have identical performance.", "E": "It eliminates the need for managing worker nodes."}, "answer": "C", "explanation": "CRI decouples Kubernetes (kubelet) from the specific runtime implementation. This allows platform operators to choose the runtime that best fits their needs (e.g., containerd, CRI-O) and potentially switch between them with minimal impact on the overall Kubernetes system.", "domain": null, "competency": "Open Standards"}, {"id": 21, "question": "If you need to automatically scale your Kubernetes cluster by adding/removing nodes based on overall resource pressure, which component is responsible?", "options": {"A": "Horizontal Pod Autoscaler (HPA)", "B": "Vertical Pod Autoscaler (VPA)", "C": "Cluster Autoscaler (CA)", "D": "kube-scheduler", "E": "metrics-server"}, "answer": "C", "explanation": "The Cluster Autoscaler specifically monitors for unschedulable Pods (due to resource constraints) and interacts with the underlying infrastructure (e.g., cloud provider) to add more nodes. It also consolidates workloads and removes underutilized nodes.", "domain": null, "competency": "Autoscaling"}, {"id": 21, "question": "In a GitOps workflow, how are changes typically promoted across different environments (e.g., staging to production)?", "options": {"A": "By directly modifying the live production cluster using kubectl.", "B": "By manually copying manifests from a staging directory to a production directory on a local machine.", "C": "By merging or promoting changes between branches or directories in the Git repository that represent different environments.", "D": "By re-running the entire CI pipeline with a &quot;production&quot; flag.", "E": "By configuring the GitOps operator to ignore environment differences."}, "answer": "C", "explanation": "A common GitOps pattern is to represent each environment (dev, staging, prod) as a separate branch or directory in Git. Promoting a change involves merging code/configuration from the staging branch/directory to the production branch/directory. The GitOps operator watching production then applies the change.", "domain": null, "competency": "GitOps"}, {"id": 21, "question": "What is the primary purpose of Secrets in Kubernetes, and how are they typically made available to Pods?", "options": {"A": "To store arbitrary non-sensitive configuration; as environment variables or files.", "B": "To store sensitive data (e.g., passwords, tokens); as environment variables or volume mounts.", "C": "To define network policies; applied directly by kubelet.", "D": "To store TLS certificates for Ingress; only used by Ingress controllers.", "E": "To store container image pull credentials; only used by kubelet."}, "answer": "B", "explanation": "Secrets are designed for sensitive information. While they can be used for image pull credentials, their broader use is for application secrets. They are base64 encoded (not encrypted by default in etcd) and can be mounted as files into Pods or exposed as environment variables.", "domain": null, "competency": "Security"}, {"id": 21, "question": "Which strategy helps manage costs associated with persistent storage in Kubernetes?", "options": {"A": "Using only hostPath volumes for all stateful applications.", "B": "Regularly reviewing PersistentVolumeClaim (PVC) usage and cleaning up unused volumes.", "C": "Disabling the Container Storage Interface (CSI) plugin.", "D": "Storing all application data within container images.", "E": "Setting storageClassName to a non-existent class."}, "answer": "B", "explanation": "Persistent storage often incurs costs. Orphaned PVCs (no longer used by any Pod) or PVCs attached to terminated resources can lead to unnecessary spending. Regularly auditing PVCs and deleting unused ones, potentially based on age or lack of mounting, is a key cost optimization practice.", "domain": null, "competency": "Cost Management"}, {"id": 21, "question": "Which type of telemetry data is most suitable for understanding the sequence of operations and latency across multiple microservices for a single user request?", "options": {"A": "Logs", "B": "Metrics", "C": "Traces (Distributed Tracing)", "D": "Events", "E": "Alerts"}, "answer": "C", "explanation": "Distributed tracing captures the end-to-end flow of a request as it propagates through different services, providing insights into latency bottlenecks and dependencies.", "domain": "Cloud Native Observability", "competency": "Telemetry &amp; Observability"}, {"id": 21, "question": "You need to provide non-sensitive configuration data (like a URL endpoint or logging level) to a Pod. Which resource is most appropriate?", "options": {"A": "Secret", "B": "ConfigMap", "C": "Annotation", "D": "ResourceQuota", "E": "DownwardAPI"}, "answer": "B", "explanation": "ConfigMaps are designed specifically for decoupling non-sensitive configuration artifacts from container images, allowing configurations to be managed independently.", "domain": null, "competency": "Kubernetes Resources"}, {"id": 22, "question": "An Ingress resource in Kubernetes provides what type of functionality?", "options": {"A": "L4 TCP/UDP load balancing for internal services.", "B": "Management of external HTTP/S access to services, with host/path based routing.", "C": "Network isolation between Pods within the same namespace.", "D": "Dynamic provisioning of persistent storage for web servers.", "E": "A CNI plugin implementation for advanced networking features."}, "answer": "B", "explanation": "Ingress objects manage external access to services in a cluster, typically HTTP/S. They provide L7 features like host-based routing (e.g., foo.example.com) and path-based routing (e.g., example.com/bar), acting as a reverse proxy. An Ingress controller implements these rules.", "domain": null, "competency": "Networking"}, {"id": 22, "question": "If you want a specific Pod to run on every node in the cluster (or a subset matching certain criteria), which workload resource should you use?", "options": {"A": "Deployment", "B": "StatefulSet", "C": "DaemonSet", "D": "Job", "E": "ReplicaSet"}, "answer": "C", "explanation": "A DaemonSet ensures that a copy of a Pod runs on all (or some specified) nodes. This is useful for node-level agents like log collectors, monitoring agents, or CNI plugins.", "domain": null, "competency": "Kubernetes Resources"}, {"id": 22, "question": "Prometheus is primarily designed for which type of observability data?", "options": {"A": "Distributed tracing", "B": "Log aggregation and analysis", "C": "Time-series metrics collection and alerting", "D": "Security auditing and compliance reporting", "E": "Real-time user monitoring (RUM)"}, "answer": "C", "explanation": "Prometheus excels at collecting, storing, and querying time-series data (metrics) from various targets, and it includes a powerful alerting mechanism based on PromQL.", "domain": "Cloud Native Observability", "competency": "Prometheus"}, {"id": 22, "question": "What is a &quot;Service Level Objective&quot; (SLO) in the context of observability and SRE?", "options": {"A": "A detailed log message indicating a service failure.", "B": "A contractual agreement with a cloud provider for uptime (SLA).", "C": "A specific, measurable target for a service&#x27;s reliability or performance (e.g., 99.9% availability).", "D": "A dashboard showing real-time resource utilization.", "E": "An alert configured in Alertmanager."}, "answer": "C", "explanation": "An SLO is an internal target for service reliability, often based on user happiness metrics (e.g., availability, latency). Observability data (metrics, logs) is used to measure performance against SLOs. Service Level Indicators (SLIs) are the metrics used to measure SLO compliance. SLAs are external agreements.", "domain": null, "competency": "Telemetry &amp; Observability"}, {"id": 22, "question": "What is the significance of using unique, immutable tags (e.g., Git SHA, semantic version) for container images in a CI/CD pipeline?", "options": {"A": "It allows developers to overwrite existing tags like latest for simplicity.", "B": "It makes it difficult to track which version of the code is running in production.", "C": "It ensures that deployments are predictable and repeatable, always pulling the exact intended version of the image.", "D": "It reduces the storage space required in the container registry.", "E": "It is primarily for aesthetic purposes in dashboard displays."}, "answer": "C", "explanation": "Using mutable tags like latest is dangerous, as the underlying image can change without the deployment configuration changing, leading to unexpected behavior. Immutable tags ensure that my-app:v1.2.3 always refers to the exact same image build, making deployments deterministic and rollbacks reliable.", "domain": null, "competency": "CI/CD"}, {"id": 22, "question": "Which statement best describes the concept of &quot;scale to zero&quot; in serverless platforms?", "options": {"A": "The platform uses zero resources when no functions are deployed.", "B": "Application instances are automatically removed when idle, consuming no resources.", "C": "Functions are limited to executing for zero seconds (instantaneous execution).", "D": "The platform requires zero configuration from the developer to deploy functions.", "E": "Only zero-cost open source serverless platforms support this feature."}, "answer": "B", "explanation": "&quot;Scale to zero&quot; means that if a serverless function or application receives no traffic or events for a period, the platform automatically scales down the number of running instances to zero. This stops resource consumption and associated costs during idle periods.", "domain": null, "competency": "Serverless"}, {"id": 23, "question": "In Prometheus, what is an &quot;exporter&quot;?", "options": {"A": "A component that sends alerts to notification channels", "B": "A database that stores long-term metric data", "C": "A client library for instrumenting application code", "D": "A piece of software that exposes metrics from third-party systems", "E": "A dashboard for visualizing metrics"}, "answer": "D", "explanation": "Exporters are helper services that fetch metrics from systems that don&#x27;t natively expose them in Prometheus format (e.g., databases, hardware, message queues) and translate them into a format Prometheus can scrape.", "domain": "Cloud Native Observability", "competency": "Prometheus"}, {"id": 23, "question": "In the context of a Service Mesh, what does &quot;traffic splitting&quot; commonly refer to?", "options": {"A": "Dividing network bandwidth equally among all services.", "B": "Routing a percentage of traffic to different versions of a service (e.g., for canary).", "C": "Encrypting only a portion of the traffic between services.", "D": "Splitting large data packets into smaller frames for transmission.", "E": "Blocking traffic from specific IP address ranges."}, "answer": "B", "explanation": "Traffic splitting is a Service Mesh capability that allows routing specific percentages of incoming requests to different versions of a service. This is crucial for deployment strategies like canary releases or A/B testing, allowing gradual rollouts and risk mitigation.", "domain": null, "competency": "Service Mesh"}, {"id": 23, "question": "What does it mean for the Kubernetes API to be &quot;declarative&quot;?", "options": {"A": "API calls must be made sequentially", "B": "Users specify the desired end state, not the steps to reach it", "C": "The API only accepts YAML formatted requests", "D": "API responses always include the full resource specification", "E": "The API can only create resources, not update or delete them"}, "answer": "B", "explanation": "Users declare the desired state of resources (e.g., &quot;I want 3 replicas of this Pod&quot;). Kubernetes controllers then figure out the sequence of actions needed to achieve and maintain that state. Contrast this with imperative approaches (&quot;run container X&quot;, &quot;scale up by 1&quot;).", "domain": null, "competency": "Kubernetes API"}, {"id": 23, "question": "What information does a Prometheus Histogram metric provide that a simple Gauge or Counter does not?", "options": {"A": "The exact time when the metric last changed value.", "B": "The total number of times an event has occurred.", "C": "The distribution of observed values across a set of configurable buckets.", "D": "The current status (up/down) of the monitored target.", "E": "The geographic location of the monitored instance."}, "answer": "C", "explanation": "Histograms sample observations (e.g., request latencies) and count them in configurable buckets (e.g., &lt;=100ms, &lt;=200ms, &lt;=500ms). They also provide the sum and count of observations. This allows calculating approximate quantiles (e.g., 95th percentile latency) using functions like histogram_quantile().", "domain": null, "competency": "Prometheus"}, {"id": 23, "question": "What is a key benefit of automating application delivery pipelines?", "options": {"A": "It increases the need for manual intervention and approvals at each stage.", "B": "It introduces more opportunities for human error during deployment.", "C": "It leads to faster, more reliable, and consistent deployments, enabling quicker feedback loops.", "D": "It makes the deployment process less transparent and harder to audit.", "E": "It primarily benefits only very small development teams."}, "answer": "C", "explanation": "Automation removes manual steps, reducing the chance of human error and speeding up the entire process from code commit to deployment. This consistency and speed enable teams to release value more frequently and get feedback faster.", "domain": null, "competency": "Application Delivery Fundamentals"}, {"id": 23, "question": "What is the significance of the CNCF Landscape (landscape.cncf.io)?", "options": {"A": "It&#x27;s the official source code repository for all CNCF projects.", "B": "It&#x27;s a legally binding contract defining how member companies must use CNCF software.", "C": "It provides an interactive map categorizing and organizing projects within the cloud native ecosystem.", "D": "It&#x27;s the primary tool used for deploying applications to Kubernetes clusters.", "E": "It&#x27;s a real-time dashboard showing the operational status of CNCF projects."}, "answer": "C", "explanation": "The CNCF Landscape is a vital resource that attempts to map the vast cloud native ecosystem, organizing projects and products into categories (e.g., database, scheduling, observability). It helps users navigate the available tools and understand the relationships between them.", "domain": null, "competency": "Community and Governance"}, {"id": 24, "question": "Consider the interaction between Application Developers and Platform Operators. What is a key aspect of their relationship in a healthy cloud native culture?", "options": {"A": "Operators dictate the exact programming languages developers must use.", "B": "Developers have unrestricted root access to all cluster nodes for debugging.", "C": "Clear interfaces and responsibilities, with Operators providing a reliable platform for Developers.", "D": "Developers are solely responsible for patching the Kubernetes control plane.", "E": "Operators manually review every line of application code before deployment."}, "answer": "C", "explanation": "A successful cloud native environment relies on a clear separation of concerns and collaboration. Operators provide a stable, automated platform with self-service capabilities, while Developers consume the platform services to build, deploy, and run their applications efficiently.", "domain": null, "competency": "Roles and Personas"}, {"id": 24, "question": "How might analyzing network egress data, often available via cloud provider monitoring or specialized tools, help control costs?", "options": {"A": "By optimizing DNS resolution times within the cluster.", "B": "By identifying unexpected or excessive data transfer out of the cluster/cloud, which often incurs costs.", "C": "By improving the efficiency of the CNI plugin&#x27;s IP address allocation.", "D": "By reducing the number of LoadBalancer services used.", "E": "By increasing the MTU size for Pod network interfaces."}, "answer": "B", "explanation": "Cloud providers typically charge for data transferred out to the internet or sometimes between regions/availability zones. Monitoring egress traffic helps identify applications sending large amounts of data unexpectedly, allowing investigation and potential optimization to reduce data transfer costs.", "domain": null, "competency": "Cost Management"}, {"id": 24, "question": "If a Pod needs temporary scratch space that is empty upon creation and deleted when the Pod terminates, which volume type is most appropriate?", "options": {"A": "hostPath", "B": "persistentVolumeClaim", "C": "emptyDir", "D": "configMap", "E": "nfs"}, "answer": "C", "explanation": "An emptyDir volume is created when a Pod is assigned to a node. It is initially empty, and its contents are deleted when the Pod is removed from the node. It&#x27;s useful for scratch space or sharing files between containers in the same Pod.", "domain": null, "competency": "Storage"}, {"id": 24, "question": "If a discrepancy exists between the state defined in Git and the live cluster state, what is the expected behavior of a GitOps reconciliation loop?", "options": {"A": "It sends an alert to the developer asking them to manually fix the cluster.", "B": "It automatically updates the Git repository to match the cluster state.", "C": "It detects the drift and takes action to modify the cluster state to match the desired state in Git.", "D": "It halts all further deployments until the discrepancy is manually resolved.", "E": "It ignores the discrepancy unless explicitly told to sync."}, "answer": "C", "explanation": "The core function of the GitOps operator&#x27;s reconciliation loop is to ensure the cluster state mirrors the state defined in Git. If drift is detected, the operator will apply the necessary changes (create, update, delete resources) to the cluster to bring it back into alignment with the Git repository.", "domain": null, "competency": "GitOps"}, {"id": 24, "question": "What is a key challenge in cost management specifically related to shared Kubernetes clusters?", "options": {"A": "High cost of Kubernetes control plane components", "B": "Difficulty in attributing resource usage to specific teams/apps", "C": "Inability to use reserved instances with Kubernetes", "D": "Lack of tools for visualizing overall cloud spend", "E": "Fixed pricing models for all Kubernetes services"}, "answer": "B", "explanation": "In multi-tenant clusters, accurately tracking and attributing resource consumption (CPU, memory, storage, network) to different applications, teams, or cost centers can be complex due to the shared nature of resources.", "domain": "Cloud Native Observability", "competency": "Cost Management"}, {"id": 24, "question": "Which mechanism prevents the kube-scheduler from placing Pods on a Node that is undergoing maintenance or is otherwise unsuitable?", "options": {"A": "ResourceQuotas", "B": "NetworkPolicies", "C": "Taints on the Node and Tolerations on the Pod", "D": "PodDisruptionBudgets", "E": "PriorityClasses"}, "answer": "C", "explanation": "A Taint applied to a Node repels Pods. Pods can express Tolerations for specific taints, allowing them to be scheduled onto those nodes. This is commonly used to cordon nodes for maintenance or dedicate nodes for specific workloads.", "domain": null, "competency": "Scheduling"}, {"id": 25, "question": "Jaeger and Zipkin are open-source tools commonly used in cloud-native environments. Which observability pillar are they primarily associated with?", "options": {"A": "Metrics aggregation and storage.", "B": "Log collection and analysis.", "C": "Distributed Tracing backend and visualization.", "D": "Alerting and notification routing.", "E": "Service discovery configuration management."}, "answer": "C", "explanation": "Jaeger and Zipkin are popular open-source distributed tracing systems. They receive trace data (spans) generated by instrumented applications (often using OpenTelemetry or native libraries), store it, and provide UIs for visualizing request traces and analyzing service dependencies and latency.", "domain": null, "competency": "Telemetry &amp; Observability"}, {"id": 25, "question": "The existence of multiple CNI (Container Network Interface) plugins (e.g., Calico, Flannel, Cilium) demonstrates what benefit of open standards?", "options": {"A": "That CNI guarantees identical features across all network plugins.", "B": "That network configuration in Kubernetes is overly complex.", "C": "That standardization allows for choice and innovation in specific implementation areas.", "D": "That CNI plugins are only developed by the CNCF itself.", "E": "That network plugins are the least stable part of Kubernetes."}, "answer": "C", "explanation": "The CNI standard defines how Kubernetes interacts with network plugins but not what features those plugins must provide beyond basic connectivity. This allows different vendors and projects to innovate and offer plugins with varying features (e.g., network policy enforcement, encryption, performance).", "domain": null, "competency": "Open Standards"}, {"id": 25, "question": "What is a key security implication of running containers as a non-root user?", "options": {"A": "It prevents containers from accessing network resources.", "B": "It reduces the potential impact if the container process is compromised.", "C": "It allows containers to bypass RBAC checks for API access.", "D": "It disables the container runtime&#x27;s ability to pull images from private registries.", "E": "It encrypts all data written by the container to its filesystem."}, "answer": "B", "explanation": "Running container processes as a non-root user is a security best practice. If an attacker compromises the process, they gain the privileges of that non-root user, which are significantly less than root, limiting their ability to harm the host system or other containers.", "domain": null, "competency": "Security"}, {"id": 25, "question": "What part of the Kubernetes system is responsible for managing the lifecycle of EndpointSlice objects, which track Pod IPs for Services?", "options": {"A": "kube-proxy", "B": "kubelet", "C": "endpointslice-controller (within kube-controller-manager)", "D": "kube-scheduler", "E": "coredns / kube-dns"}, "answer": "C", "explanation": "The endpointslice-controller (part of kube-controller-manager) watches Services and their selector-matched Pods, creating and managing EndpointSlices to store the Pod IP addresses and port information efficiently. kube-proxy consumes this information.", "domain": null, "competency": "Kubernetes Architecture"}, {"id": 25, "question": "What security practice should be integrated into a CI pipeline dealing with container images?", "options": {"A": "Disabling all network access for the CI runner.", "B": "Storing plain-text API keys directly in the pipeline script.", "C": "Scanning container images for known vulnerabilities (CVEs) using tools like Trivy, Clair, or Snyk.", "D": "Granting the CI runner root privileges on the build host.", "E": "Bypassing all automated tests to speed up the build process."}, "answer": "C", "explanation": "Integrating automated vulnerability scanning into the CI pipeline helps identify and potentially block images with known security flaws before they are pushed to a registry or deployed. This is a crucial step in securing the software supply chain.", "domain": null, "competency": "CI/CD"}, {"id": 25, "question": "Which principle is central to the GitOps methodology for application and infrastructure deployment?", "options": {"A": "Using imperative scripts stored in Git", "B": "Managing only stateless applications via Git", "C": "Treating Git as the single source of truth for desired state", "D": "Requiring manual approval for all Git commits", "E": "Using Git LFS for storing container images"}, "answer": "C", "explanation": "GitOps emphasizes a declarative approach where the entire desired state of the system (applications, infrastructure) is described in Git, and an automated process ensures the live environment converges to this state.", "domain": "Cloud Native Application Delivery", "competency": "GitOps"}, {"id": 26, "question": "In a CI/CD pipeline for a cloud native application, what is the typical output of the &quot;Continuous Integration&quot; (CI) phase?", "options": {"A": "A running application in production", "B": "A new Kubernetes cluster provisioned", "C": "A tested and versioned container image/artifact", "D": "A detailed cost analysis report", "E": "A set of user stories for the next sprint"}, "answer": "C", "explanation": "The CI phase focuses on building the application, running automated tests, and producing a reliable, versioned artifact (often a container image) that is ready for deployment.", "domain": "Cloud Native Application Delivery", "competency": "CI/CD"}, {"id": 26, "question": "What is the purpose of the job label automatically added by Prometheus during scraping?", "options": {"A": "To identify the specific metric name being scraped.", "B": "To indicate the IP address and port of the scraped target.", "C": "To group targets belonging to the same scrape configuration (e.g., &quot;kubernetes-pods&quot;).", "D": "To specify the data center location of the Prometheus server.", "E": "To store the timestamp of the last successful scrape."}, "answer": "C", "explanation": "Prometheus configuration defines scrape jobs (e.g., a job to scrape all pods with label app=api). The job label is automatically attached to all metrics scraped from targets within that job definition, allowing easy filtering and aggregation for all instances of a particular service type.", "domain": null, "competency": "Prometheus"}, {"id": 26, "question": "What is the typical interaction flow when kubelet needs to start a Pod using a CRI-compliant runtime?", "options": {"A": "kubelet directly calls runc to create the container.", "B": "kubelet sends a request to the CRI gRPC server implemented by the runtime.", "C": "kubelet updates etcd, and the runtime reads the changes.", "D": "kubelet instructs kube-proxy to prepare the network for the runtime.", "E": "kubelet uses kubectl commands to tell the runtime what to do."}, "answer": "B", "explanation": "kubelet acts as a client to the CRI gRPC server implemented by the container runtime (e.g., containerd). It sends requests like RunPodSandbox (to create the Pod&#x27;s environment) and CreateContainer/StartContainer for each container in the Pod.", "domain": null, "competency": "Runtime"}, {"id": 26, "question": "Which component is typically NOT considered part of a core GitOps workflow?", "options": {"A": "A Git repository containing declarative manifests.", "B": "An automated mechanism to apply changes from Git to the cluster (Operator).", "C": "A mechanism to observe the cluster state and compare it with Git (Operator).", "D": "An imperative script run manually by developers to deploy applications.", "E": "A feedback mechanism reporting synchronization status."}, "answer": "D", "explanation": "GitOps relies on declarative configurations and automated reconciliation. Manually executed imperative scripts bypass the core GitOps loop and principles, potentially leading to configuration drift and loss of auditability.", "domain": null, "competency": "GitOps"}, {"id": 26, "question": "Which component translates a Service&#x27;s virtual IP address into actual Pod IP addresses on each node?", "options": {"A": "etcd", "B": "kube-apiserver", "C": "coredns / kube-dns", "D": "kube-proxy", "E": "kubelet"}, "answer": "D", "explanation": "kube-proxy, running on each node, watches Services and Endpoints/EndpointSlices. It programs network rules (e.g., iptables, IPVS) to intercept traffic destined for a Service&#x27;s ClusterIP and directs it to one of the healthy backend Pod IPs.", "domain": null, "competency": "Kubernetes Architecture"}, {"id": 26, "question": "You have a stateless web application deployed using a Kubernetes Deployment. Traffic fluctuates significantly. You want to automatically adjust the number of Pods based on average CPU utilization. Which tool is most appropriate?", "options": {"A": "Cluster Autoscaler (CA)", "B": "Vertical Pod Autoscaler (VPA)", "C": "Horizontal Pod Autoscaler (HPA) configured with a CPU utilization target.", "D": "Manually adjusting the replicas field in the Deployment manifest.", "E": "Using a DaemonSet instead of a Deployment."}, "answer": "C", "explanation": "HPA is designed specifically for this use case: scaling the number of replicas for a workload (like a Deployment) based on metrics like CPU or memory utilization.", "domain": null, "competency": "Autoscaling"}, {"id": 27, "question": "A StatefulSet is often preferred over a Deployment for running databases. Why?", "options": {"A": "StatefulSets have simpler configuration", "B": "Deployments cannot use Persistent Storage", "C": "StatefulSets provide stable, unique network IDs and persistent storage per Pod", "D": "Deployments automatically handle database schema migrations", "E": "StatefulSets require less CPU and memory resources"}, "answer": "C", "explanation": "StatefulSets provide guarantees crucial for stateful apps: stable network identifiers (e.g., db-0, db-1), stable persistent storage linked to each identity, and ordered, graceful deployment and scaling.", "domain": null, "competency": "Kubernetes Resources"}, {"id": 27, "question": "In CI/CD for Kubernetes, why is it often better to update the image tag in a deployment manifest rather than using the latest tag?", "options": {"A": "Using latest triggers automatic rollbacks on failure.", "B": "The latest tag provides better caching performance in the container registry.", "C": "Updating a specific tag declaratively triggers a controlled rollout; latest doesn&#x27;t reliably signal updates.", "D": "The latest tag is not supported by most container registries.", "E": "Using specific tags requires less storage space in Git."}, "answer": "C", "explanation": "Kubernetes Deployments typically trigger a rollout only when the Pod template changes. Simply pushing a new image with the latest tag doesn&#x27;t change the manifest, so Kubernetes might not update running Pods. Using a unique tag (e.g., v1.2.3) forces a change in the manifest, reliably triggering the desired rollout strategy.", "domain": null, "competency": "CI/CD"}, {"id": 27, "question": "In Kubernetes, what is the purpose of an EndpointSlice object in relation to a Service?", "options": {"A": "To define the external IP address for a LoadBalancer Service.", "B": "To store the DNS configuration for a Service.", "C": "To efficiently track and provide the IP addresses and ports of Pods backing a Service.", "D": "To enforce network policies for traffic destined to a Service.", "E": "To manage TLS termination for a Service."}, "answer": "C", "explanation": "EndpointSlices offer a more scalable and extensible way to track the network endpoints (Pod IPs and ports) that a Service routes to. They replaced the older Endpoints object for improved performance, especially in large clusters with many Pods per Service.", "domain": null, "competency": "Networking"}, {"id": 27, "question": "What is the primary benefit of implementing CI/CD pipelines for application delivery?", "options": {"A": "It eliminates the need for testing", "B": "It reduces infrastructure costs significantly", "C": "It enables faster, more reliable software releases", "D": "It automatically writes application code", "E": "It replaces the need for version control systems"}, "answer": "C", "explanation": "CI/CD automates the build, test, and deployment processes, leading to increased release velocity, improved code quality through automated testing, and more consistent deployments.", "domain": "Cloud Native Application Delivery", "competency": "Application Delivery Fundamentals"}, {"id": 27, "question": "Which Kubernetes object can set default resource requests and limits for containers within a namespace if not specified in the Pod spec, indirectly aiding cost predictability?", "options": {"A": "ConfigMap", "B": "Secret", "C": "LimitRange", "D": "HorizontalPodAutoscaler", "E": "MutatingWebhookConfiguration"}, "answer": "C", "explanation": "A LimitRange can enforce minimum/maximum resource constraints and, crucially, apply default requests and limits to containers that don&#x27;t explicitly define them. This ensures Pods have some resource boundaries set, preventing unbounded consumption and aiding resource allocation and cost estimation.", "domain": null, "competency": "Cost Management"}, {"id": 27, "question": "Which is NOT a typical characteristic often associated with serverless architectures (especially FaaS)?", "options": {"A": "Stateless function execution (state managed externally).", "B": "Short-lived execution durations for functions.", "C": "Built-in requirement for managing complex state within the function instance itself.", "D": "Event-driven triggers (e.g., HTTP, queues, storage events).", "E": "Automatic scaling based on demand (including scale-to-zero)."}, "answer": "C", "explanation": "Serverless functions are typically designed to be stateless. State should be managed externally (e.g., in databases, caches, storage services) because function instances can be created and destroyed frequently, and requests might be served by different instances with no shared memory.", "domain": null, "competency": "Serverless"}, {"id": 28, "question": "How does CNCF governance typically handle decision-making for technical directions within its hosted projects?", "options": {"A": "Decisions are made solely by the original creators of the project.", "B": "Decisions are dictated by the CNCF governing board based on member votes.", "C": "Through community consensus, meritocracy, and processes defined by project-specific governance (e.g., SIGs, maintainers).", "D": "Based on the highest bidder among commercial vendors supporting the project.", "E": "Following directives from the Linux Foundation technical board."}, "answer": "C", "explanation": "CNCF projects generally operate under open governance models. Technical decisions are usually made by maintainers and contributors through public discussion, consensus building (e.g., via mailing lists, GitHub issues/PRs, SIG meetings), and documented processes, reflecting a meritocratic approach.", "domain": null, "competency": "Community and Governance"}, {"id": 28, "question": "What does &quot;Shift Left&quot; mean in the context of security in application delivery?", "options": {"A": "Moving security testing and considerations to the rightmost (production) stage of the pipeline.", "B": "Integrating security checks and practices earlier in the development lifecycle (e.g., in CI).", "C": "Assigning all security responsibilities solely to a dedicated security team.", "D": "Ignoring security concerns until after an application has been deployed.", "E": "Focusing security efforts only on the underlying infrastructure."}, "answer": "B", "explanation": "&quot;Shift Left&quot; encourages incorporating security practices (like code analysis, dependency scanning, image vulnerability scanning) earlier in the software development lifecycle (closer to the &quot;left&quot; side, where code is written) rather than treating security as an afterthought just before release.", "domain": null, "competency": "Application Delivery Fundamentals"}, {"id": 28, "question": "What does a ReplicaSet ensure in Kubernetes?", "options": {"A": "That a Pod runs on every node", "B": "That a certain number of Pod replicas are running", "C": "That Pods have stable network identifiers", "D": "That external traffic can reach the Pods", "E": "That Pods are scheduled according to affinity rules"}, "answer": "B", "explanation": "A ReplicaSet&#x27;s primary purpose is to maintain a stable set of replica Pods running at any given time, ensuring the desired number of instances of an application are available. Deployments manage ReplicaSets.", "domain": "Kubernetes Fundamentals", "competency": "Kubernetes Resources"}, {"id": 28, "question": "What is meant by &quot;cardinality&quot; in the context of Prometheus metrics and labels?", "options": {"A": "The number of different metric names exposed by a target.", "B": "The total number of targets being scraped by Prometheus.", "C": "The number of unique time series generated by a metric name and its distinct label combinations.", "D": "The frequency at which Prometheus scrapes a specific target.", "E": "The storage duration configured for metrics data."}, "answer": "C", "explanation": "High cardinality occurs when a metric has many unique combinations of label values (e.g., using user ID or request ID as a label). This creates many distinct time series, which can significantly increase resource consumption (memory, CPU, storage) on the Prometheus server. Managing cardinality is crucial.", "domain": null, "competency": "Telemetry &amp; Observability"}, {"id": 28, "question": "What is the primary goal of the Open Container Initiative (OCI)?", "options": {"A": "To create a commercial container platform", "B": "To define open standards around container formats and runtime", "C": "To manage the Kubernetes source code repository", "D": "To develop container networking plugins (CNI)", "E": "To provide free container image hosting"}, "answer": "B", "explanation": "OCI aims to establish common, open, minimal standards for container image formats and container runtime execution to ensure interoperability and prevent fragmentation in the container ecosystem.", "domain": null, "competency": "Containers"}, {"id": 28, "question": "Which component of a Service Mesh architecture is typically injected as a sidecar container into application Pods?", "options": {"A": "The control plane&#x27;s central policy manager.", "B": "The data plane proxy (e.g., Envoy, Linkerd2-proxy).", "C": "The certificate authority for issuing mTLS certificates.", "D": "The metrics collection and aggregation server.", "E": "The UI dashboard for visualizing mesh topology."}, "answer": "B", "explanation": "In a Service Mesh, a data plane proxy (like Envoy or Linkerd2-proxy) is usually deployed as a sidecar container alongside each application container in the Pod. This proxy intercepts all network traffic to and from the application container, enabling the mesh&#x27;s features.", "domain": null, "competency": "Service Mesh"}, {"id": 29, "question": "A StatefulSet requires stable, unique network identifiers for its Pods. How is this typically achieved in Kubernetes?", "options": {"A": "By manually assigning static IP addresses to each Pod.", "B": "Through a headless Service that creates DNS records for each Pod.", "C": "Using hostNetwork: true for all Pods in the StatefulSet.", "D": "By relying on CNI plugins to assign predictable IPs from a predefined range.", "E": "By using NetworkPolicy to restrict Pod IPs."}, "answer": "B", "explanation": "StatefulSets often use a headless Service (a Service with clusterIP: None). This causes DNS to create A records for each Pod (e.g., mypod-0.my-service.my-namespace) that resolve directly to the Pod&#x27;s IP, providing stable, resolvable hostnames.", "domain": null, "competency": "Networking"}, {"id": 29, "question": "A key responsibility of a Platform Operator/SRE is managing the &quot;control plane&quot; of the cloud native platform. What does this typically entail?", "options": {"A": "Developing the user interface for business applications.", "B": "Ensuring the availability, performance, and security of Kubernetes core components (API server, etcd, etc.).", "C": "Writing unit tests for application microservices.", "D": "Defining the product roadmap for end-user features.", "E": "Onboarding new application development teams."}, "answer": "B", "explanation": "The control plane (e.g., Kubernetes API server, scheduler, controller manager, etcd) is the brain of the platform. Operators are responsible for its installation, configuration, upgrades, security, monitoring, and ensuring its overall health and reliability.", "domain": null, "competency": "Roles and Personas"}, {"id": 29, "question": "Can GitOps manage resources outside of Kubernetes (e.g., cloud databases, DNS records)?", "options": {"A": "No, GitOps is strictly limited to managing Kubernetes API objects.", "B": "Yes, potentially, if using tools like Crossplane or Terraform controllers that extend the GitOps model to manage external resources.", "C": "Only if the external resources are manually synchronized with Git state.", "D": "No, managing external resources always requires a separate imperative process.", "E": "Yes, by storing credentials for cloud providers directly in Git manifests."}, "answer": "B", "explanation": "While core GitOps tools focus on Kubernetes, the principles can be extended. Tools like Crossplane allow defining external cloud resources using Kubernetes custom resources (CRDs). A GitOps operator can then manage these CRDs, effectively extending the GitOps workflow to provision and manage external resources declaratively.", "domain": null, "competency": "GitOps"}, {"id": 29, "question": "What is the difference between the up metric automatically generated by Prometheus and application-specific health check metrics?", "options": {"A": "up is a gauge, while health checks are counters.", "B": "up indicates scrape success; health checks indicate application functionality.", "C": "up is only generated for Kubernetes Pods; health checks are for external services.", "D": "up requires custom instrumentation; health checks are built-in.", "E": "up triggers Alertmanager directly; health checks require PromQL rules."}, "answer": "B", "explanation": "Prometheus automatically generates an up{job=&quot;...&quot;, instance=&quot;...&quot;} metric for each target scrape (1 if successful, 0 if failed). This only tells if Prometheus could reach the /metrics endpoint. Application health checks (e.g., a /healthz endpoint) verify internal application logic or dependencies.", "domain": null, "competency": "Prometheus"}, {"id": 29, "question": "Which kubectl command is used to view the logs of a running container within a Pod?", "options": {"A": "kubectl get pod &lt;pod-name&gt; --logs", "B": "kubectl describe pod &lt;pod-name&gt;", "C": "kubectl logs &lt;pod-name&gt; [-c &lt;container-name&gt;]", "D": "kubectl attach &lt;pod-name&gt; -c &lt;container-name&gt;", "E": "kubectl exec &lt;pod-name&gt; -- tail /var/log/messages"}, "answer": "C", "explanation": "kubectl logs fetches the logs (stdout/stderr) from a specified container within a Pod. The -c flag is needed if the Pod has multiple containers.", "domain": null, "competency": "Kubernetes API"}, {"id": 29, "question": "Which of the following is NOT a core characteristic of cloud native architectures?", "options": {"A": "Microservices", "B": "Containers", "C": "Monolithic application design", "D": "DevOps practices", "E": "Automation"}, "answer": "C", "explanation": "Cloud native architectures typically favor microservices, containers, dynamic orchestration (like Kubernetes), and DevOps/Agile practices, moving away from large, tightly coupled monolithic designs.", "domain": "Cloud Native Architecture", "competency": "Cloud Native Principles (implied)"}, {"id": 30, "question": "Tools like Kubecost or OpenCost integrate with Kubernetes and cloud providers primarily to achieve what?", "options": {"A": "To automatically optimize application code for better performance.", "B": "To provide detailed cost allocation, monitoring, and optimization insights specific to Kubernetes workloads.", "C": "To replace the need for Prometheus and Grafana entirely.", "D": "To manage user authentication and RBAC policies within the cluster.", "E": "To deploy and manage CNI network plugins."}, "answer": "B", "explanation": "These tools specialize in Kubernetes cost management. They correlate resource usage data (from metrics) with cloud billing data and Kubernetes object metadata (labels, namespaces) to provide granular insights into how much specific deployments, teams, or namespaces are costing and where optimizations are possible.", "domain": null, "competency": "Cost Management"}, {"id": 30, "question": "What is the function of an Admission Controller in the Kubernetes API request lifecycle?", "options": {"A": "To authenticate the user making the request", "B": "To authorize the requested operation", "C": "To mutate or validate API objects before they are persisted in etcd", "D": "To schedule the Pod onto a suitable node", "E": "To route network traffic to the correct Pod"}, "answer": "C", "explanation": "Admission Controllers intercept API requests after authentication and authorization but before persistence. They can mutate objects (e.g., inject sidecars, set default values) or validate them (e.g., enforce security policies, check resource quotas).", "domain": null, "competency": "Kubernetes API"}, {"id": 30, "question": "What is the main purpose of a ServiceAccount in Kubernetes when interacting with the API server?", "options": {"A": "To define network access policies for Pods", "B": "To provide an identity for Pods to authenticate to the API", "C": "To store sensitive credentials for applications", "D": "To group users for applying permissions", "E": "To manage DNS records for services"}, "answer": "B", "explanation": "ServiceAccounts provide an identity for processes running within Pods. This identity can be used to authenticate to the Kubernetes API server, and RBAC rules can grant it specific permissions.", "domain": "Container Orchestration", "competency": "Security"}, {"id": 30, "question": "What is the purpose of a &quot;smoke test&quot; in a CD pipeline, often run immediately after deployment?", "options": {"A": "To perform comprehensive end-to-end functional testing of all features.", "B": "To check the basic health and availability of the newly deployed application or service.", "C": "To run security vulnerability scans on the deployed application.", "D": "To gather detailed performance metrics under simulated heavy load.", "E": "To verify the configuration stored in the Git repository."}, "answer": "B", "explanation": "A smoke test is a quick, basic check to ensure the application starts correctly and key functionalities are available (e.g., can it serve a simple request? Is the homepage accessible?). It&#x27;s not exhaustive but provides rapid feedback on whether the deployment was fundamentally successful.", "domain": null, "competency": "CI/CD"}, {"id": 30, "question": "What problem does the Service Mesh Interface (SMI) specification aim to address?", "options": {"A": "The lack of service mesh options available for Kubernetes.", "B": "The difficulty in installing service mesh control planes.", "C": "The need for a standard interface for interacting with different service meshes on Kubernetes.", "D": "The inability of service meshes to handle non-HTTP traffic.", "E": "The high performance overhead associated with service mesh sidecars."}, "answer": "C", "explanation": "SMI aims to provide a standard set of APIs for common service mesh functionalities (like traffic splitting, metrics, access control) on Kubernetes. This allows users and tool builders to interact with different service mesh implementations (like Istio, Linkerd, Consul) in a more portable way.", "domain": null, "competency": "Open Standards"}, {"id": 30, "question": "When using dynamic provisioning for Kubernetes storage, what happens if a PersistentVolumeClaim requests a StorageClass that does not exist?", "options": {"A": "The PVC remains in a Pending state indefinitely or until the class is created.", "B": "Kubernetes automatically creates a default StorageClass and uses it.", "C": "The Pod attempting to use the PVC will fail to start with a network error.", "D": "The PVC will use any available PersistentVolume regardless of its StorageClass.", "E": "The request defaults to using hostPath storage on the assigned node."}, "answer": "A", "explanation": "If a PVC specifies a StorageClass that doesn&#x27;t exist, and no default StorageClass is able to fulfill the request, the PVC will remain in the Pending state because no storage can be dynamically provisioned to satisfy its requirements.", "domain": null, "competency": "Storage"}, {"id": 31, "question": "Can Vertical Pod Autoscaler (VPA) and Horizontal Pod Autoscaler (HPA) be safely used together on the same workload for CPU/memory scaling?", "options": {"A": "Yes, they work seamlessly together by default.", "B": "No, they are fundamentally incompatible and will conflict.", "C": "It&#x27;s generally discouraged or requires careful configuration, as they can interfere with each other.", "D": "Yes, but only if the Cluster Autoscaler is also enabled.", "E": "VPA automatically disables HPA when applied to the same workload."}, "answer": "C", "explanation": "Using VPA (to adjust requests/limits) and HPA (to adjust replicas) simultaneously for the same resources (CPU/memory) is complex and often problematic. VPA might change resource requests, affecting HPA&#x27;s utilization calculations, leading to instability. It&#x27;s often recommended to use VPA for resource sizing recommendations and HPA for scaling replicas.", "domain": null, "competency": "Autoscaling"}, {"id": 31, "question": "How does GitOps handle failed deployments or rollbacks compared to traditional methods?", "options": {"A": "Rollbacks require complex manual intervention on the cluster.", "B": "Failures are ignored until the next successful Git commit.", "C": "Rollbacks are typically achieved by reverting the change in Git and letting the operator synchronize the cluster to the previous known good state.", "D": "Failed deployments automatically trigger a full cluster rebuild.", "E": "Rollbacks are not possible within a GitOps framework."}, "answer": "C", "explanation": "Because the desired state is versioned in Git, rolling back is often as simple as git revert &lt;commit-hash&gt;. The GitOps operator detects this change in the desired state (now pointing to the older configuration) and automatically rolls the cluster back accordingly.", "domain": null, "competency": "GitOps"}, {"id": 31, "question": "If you need to run a batch job that completes and then terminates, which Kubernetes workload resource is most suitable?", "options": {"A": "Deployment", "B": "StatefulSet", "C": "DaemonSet", "D": "Job", "E": "Service"}, "answer": "D", "explanation": "A Job creates one or more Pods and ensures that a specified number of them successfully terminate. It&#x27;s ideal for batch tasks, while CronJob is for scheduled Jobs.", "domain": "Kubernetes Fundamentals", "competency": "Kubernetes Resources"}, {"id": 31, "question": "What is a potential downside of relying only on logs for observability?", "options": {"A": "Logs cannot capture detailed error messages.", "B": "Logs are difficult to aggregate and query for trends or patterns across many instances.", "C": "Logs do not provide timestamps for events.", "D": "Logs cannot be generated by most modern applications.", "E": "Logs cannot be stored centrally."}, "answer": "B", "explanation": "While detailed, querying massive volumes of logs from distributed systems to understand overall trends (e.g., average latency, error rate) or relationships between events across services can be slow, expensive, and complex compared to querying pre-aggregated metrics or structured traces.", "domain": null, "competency": "Telemetry &amp; Observability"}, {"id": 31, "question": "What is the primary benefit of using orchestration for rolling updates compared to manual, script-based updates?", "options": {"A": "Faster individual container restart times.", "B": "Guaranteed zero cost for update operations.", "C": "Automated health checks, progressive rollout, and easier rollback capabilities.", "D": "Elimination of the need for container image registries.", "E": "In-place binary patching of running application code."}, "answer": "C", "explanation": "Orchestrators manage rolling updates by incrementally replacing old instances with new ones, performing health checks on new instances before proceeding, and allowing for automated or easy rollbacks if issues arise. This is far more robust than manual scripting.", "domain": null, "competency": "Container Orchestration Fundamentals"}, {"id": 31, "question": "Which resource defines constraints on the total amount of compute resources (CPU, memory) that can be consumed within a specific Namespace?", "options": {"A": "LimitRange", "B": "ResourceQuota", "C": "NetworkPolicy", "D": "PodSecurityPolicy / PodSecurityAdmission", "E": "PriorityClass"}, "answer": "B", "explanation": "A ResourceQuota limits the aggregate resource consumption (CPU, memory, storage, object counts) within a Namespace, preventing overuse and ensuring fair sharing among users or teams.", "domain": null, "competency": "Kubernetes Resources"}, {"id": 32, "question": "Consider a Pod that needs to perform a one-time initialization task before its main application container starts. Which container type is best suited for this?", "options": {"A": "Sidecar Container", "B": "Ephemeral Container", "C": "Init Container", "D": "Main Application Container", "E": "Job Container"}, "answer": "C", "explanation": "Init Containers run sequentially before the main application containers in a Pod start. They must complete successfully for the main containers to launch, making them ideal for setup tasks like database schema migration, fetching configuration, or waiting for dependencies.", "domain": null, "competency": "Containers"}, {"id": 32, "question": "How does Prometheus&#x27;s remote_write feature contribute to observability?", "options": {"A": "It allows Prometheus to scrape targets located in remote data centers.", "B": "It enables Prometheus to send alerts directly to remote notification systems.", "C": "It allows Prometheus to forward ingested metrics to long-term storage or other analysis systems.", "D": "It lets users remotely query Prometheus metrics via an API.", "E": "It configures remote Grafana instances automatically."}, "answer": "C", "explanation": "remote_write allows Prometheus to stream its collected metrics data in near real-time to compatible remote endpoints. This is commonly used for long-term storage solutions (e.g., Thanos, Cortex, VictoriaMetrics, cloud vendor TSDBs) that can handle larger data volumes and longer retention periods.", "domain": null, "competency": "Prometheus"}, {"id": 32, "question": "What is a key difference between containerd and Docker Engine in the context of Kubernetes (post-dockershim removal)?", "options": {"A": "containerd cannot run Docker-formatted images; Docker Engine can.", "B": "Docker Engine includes build tools and a CLI; containerd is a core runtime.", "C": "containerd is not OCI compliant; Docker Engine is.", "D": "Docker Engine implements CRI directly; containerd requires a shim.", "E": "containerd is only for Linux; Docker Engine is cross-platform."}, "answer": "B", "explanation": "Docker Engine is a larger platform that includes client tools (docker CLI), image building capabilities, and the containerd runtime itself. containerd is a focused OCI-compliant core runtime component designed to be embedded into larger systems like Kubernetes or Docker Engine.", "domain": null, "competency": "Runtime"}, {"id": 32, "question": "What is a potential drawback or challenge associated with serverless FaaS architectures compared to traditional long-running services?", "options": {"A": "Significantly higher infrastructure costs when constantly busy.", "B": "Difficulty in achieving automatic scaling.", "C": "Lack of support for common programming languages.", "D": "Cold starts (latency introduced when invoking an idle function).", "E": "Inability to integrate with other cloud services."}, "answer": "D", "explanation": "Cold starts occur when a request comes in for a function that has no active instances (scaled to zero or idle). The platform needs to initialize an instance, load the code, and start it, which adds latency to the first request after a period of inactivity.", "domain": null, "competency": "Serverless"}, {"id": 32, "question": "What is the relationship between Continuous Integration (CI) and GitOps?", "options": {"A": "GitOps replaces the need for a CI server entirely.", "B": "CI builds artifacts (e.g., container images); GitOps often consumes these artifacts for deployment based on Git state.", "C": "CI is responsible for deploying manifests; GitOps is responsible for building images.", "D": "They are mutually exclusive approaches to application delivery.", "E": "GitOps is a specific tool used only within CI pipelines."}, "answer": "B", "explanation": "CI and GitOps are complementary. The CI pipeline typically handles building the application, running tests, and producing artifacts like container images (often pushing them to a registry). A commit updating a manifest in Git (e.g., with the new image tag) then triggers the GitOps workflow to deploy that artifact.", "domain": null, "competency": "CI/CD &amp; GitOps"}, {"id": 32, "question": "Which of the following best describes the concept of &quot;desired state&quot; in Kubernetes?", "options": {"A": "The current operational status of cluster nodes", "B": "The configuration specified by the user for their resources", "C": "The real-time metrics collected by Prometheus", "D": "The log output generated by running containers", "E": "The network policies applied to Pods"}, "answer": "B", "explanation": "Users define the desired state of their applications and infrastructure via Kubernetes API objects (e.g., in YAML files). Kubernetes controllers then continuously work to make the actual state of the cluster match this desired state.", "domain": "Kubernetes Fundamentals", "competency": "Kubernetes Architecture"}, {"id": 33, "question": "Allocating costs based on Namespace in Kubernetes is a common strategy. What is a prerequisite for this approach to be effective?", "options": {"A": "All Pods must run with hostNetwork: true.", "B": "Resources (Pods, PVCs, Services) must be consistently deployed into appropriate team/application-specific Namespaces.", "C": "The cluster must use the Cluster Autoscaler.", "D": "All applications must be instrumented with OpenTelemetry.", "E": "Only LoadBalancer services should be used for external access."}, "answer": "B", "explanation": "If resources belonging to different teams or applications are mixed within the same Namespace, attributing costs accurately becomes difficult. A disciplined approach where each team or application has its own Namespace(s) allows usage and costs to be aggregated at the Namespace level.", "domain": null, "competency": "Cost Management"}, {"id": 33, "question": "How does Role-Based Access Control (RBAC) in Kubernetes contribute to the principle of least privilege?", "options": {"A": "By encrypting all API communication by default.", "B": "By ensuring all Pods run with minimal resource requests and limits.", "C": "By allowing administrators to grant users/ServiceAccounts only necessary permissions.", "D": "By automatically rotating credentials for ServiceAccounts.", "E": "By restricting network access between namespaces."}, "answer": "C", "explanation": "RBAC allows fine-grained control over who can perform what actions on which resources. By creating specific Roles/ClusterRoles with minimal necessary permissions and binding them to users or ServiceAccounts, administrators can enforce least privilege, reducing the attack surface.", "domain": null, "competency": "Security"}, {"id": 33, "question": "The &quot;DevOps&quot; culture is central to cloud native paradigms. What core principle does DevOps emphasize?", "options": {"A": "Complete separation of development and operations teams and responsibilities.", "B": "Prioritizing feature development speed over operational stability.", "C": "Collaboration, shared responsibility, and automation between development and operations.", "D": "Replacing operations teams entirely with automated tools managed by developers.", "E": "Focusing solely on infrastructure automation, ignoring application development."}, "answer": "C", "explanation": "DevOps promotes breaking down silos between development and operations teams. It emphasizes shared goals, collaboration, communication, and automating processes (CI/CD, IaC) to deliver software faster and more reliably.", "domain": null, "competency": "Community and Governance"}, {"id": 33, "question": "What is the purpose of the metadata.ownerReferences field in a Kubernetes object?", "options": {"A": "To specify the user who created the object", "B": "To link the object to its managing controller (e.g., ReplicaSet to Deployment)", "C": "To list labels used for selecting the object", "D": "To store annotations related to the object&#x27;s owner", "E": "To define the Namespace the object belongs to"}, "answer": "B", "explanation": "ownerReferences create parent-child relationships between objects. This enables cascading deletion (deleting the owner deletes dependents) and helps controllers identify the objects they manage. For example, a ReplicaSet Pod will have an ownerReference pointing to the ReplicaSet.", "domain": null, "competency": "Kubernetes Resources"}, {"id": 33, "question": "Which OCI specification defines the format of a container image?", "options": {"A": "Runtime Specification", "B": "Image Specification", "C": "Distribution Specification", "D": "Network Specification", "E": "Storage Specification"}, "answer": "B", "explanation": "The OCI Image Specification defines how to create and package a container image, ensuring interoperability across different container tools and runtimes tha
