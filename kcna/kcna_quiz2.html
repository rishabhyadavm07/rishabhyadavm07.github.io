ctl users.", "C": "Providing automatic mutual TLS (mTLS) between all services in the mesh.", "D": "Scanning Pods for known vulnerabilities.", "E": "Managing firewall rules at the cluster&#x27;s edge."}, "answer": "C", "explanation": "A key feature of many Service Meshes is the ability to automatically establish and enforce mTLS for all traffic between services in the mesh. This encrypts traffic and ensures that services mutually authenticate each other, a core tenet of zero-trust networking.", "domain": null, "competency": "Service Mesh"}, {"id": 17, "question": "What does &quot;event-driven&quot; architecture, often associated with serverless functions, mean?", "options": {"A": "Applications must be written using event sourcing patterns.", "B": "Code execution is triggered by the occurrence of specific events (e.g., HTTP request, message).", "C": "The platform uses events internally for scheduling, hidden from the user.", "D": "All application state must be stored within the event payload.", "E": "Only asynchronous communication patterns can be used."}, "answer": "B", "explanation": "In an event-driven model, components react to events. Serverless functions are often designed this way: an event occurs (like an API call, a file upload, a database change), and the platform triggers the corresponding function to process that event.", "domain": null, "competency": "Serverless"}, {"id": 17, "question": "What is a potential challenge or consideration when implementing GitOps?", "options": {"A": "It makes rollbacks significantly more difficult than traditional methods.", "B": "It requires developers to have direct kubectl apply access to production clusters.", "C": "Managing secrets securely within a Git-based workflow requires careful handling (e.g., using sealed secrets, external secret managers).", "D": "It eliminates the need for any CI pipeline processes like building and testing.", "E": "It only works with specific proprietary Git hosting providers."}, "answer": "C", "explanation": "Storing plain-text secrets in Git is a major security risk. GitOps workflows require solutions to manage secrets safely, such as encrypting them in Git (e.g., Sealed Secrets, SOPS) and decrypting them only within the cluster, or fetching them from external secret management systems (e.g., HashiCorp Vault, AWS Secrets Manager).", "domain": null, "competency": "GitOps"}, {"id": 17, "question": "What is the primary function of etcd within the Kubernetes architecture?", "options": {"A": "To run the container runtime interface", "B": "To schedule Pods across available nodes", "C": "To provide reliable, distributed storage for cluster state and configuration", "D": "To manage network policies and ingress rules", "E": "To execute health checks against running containers"}, "answer": "C", "explanation": "etcd is the consistent key-value store that acts as the source of truth for the entire cluster. All configuration, state, and metadata are persisted here, ensuring consistency across the control plane.", "domain": null, "competency": "Kubernetes Architecture"}, {"id": 17, "question": "What type of Prometheus metric is most suitable for tracking a value that can arbitrarily increase or decrease, like the current number of active connections?", "options": {"A": "Counter", "B": "Gauge", "C": "Histogram", "D": "Summary", "E": "Info"}, "answer": "B", "explanation": "A Gauge represents a single numerical value that can go up or down. It&#x27;s suitable for metrics like temperature, current memory usage, or the number of items in a queue. Counters only go up (or reset to zero). Histograms and Summaries track distributions.", "domain": null, "competency": "Prometheus"}, {"id": 18, "question": "How does the CNCF promote cloud native principles and best practices within the community?", "options": {"A": "By mandating the use of specific programming languages for hosted projects.", "B": "By selling proprietary tools that enforce best practices.", "C": "Through publications (e.g., blog, reports), webinars, events (like KubeCon), and fostering collaboration.", "D": "By directly managing the infrastructure for all member companies.", "E": "By providing legally binding architectural blueprints."}, "answer": "C", "explanation": "CNCF acts as a thought leader and community hub. It shares knowledge and promotes best practices through various channels like its website, blog, webinars, research papers, landscape map, and major conferences like KubeCon + CloudNativeCon.", "domain": null, "competency": "Community and Governance"}, {"id": 18, "question": "The Container Storage Interface (CSI) was developed to address what challenge in Kubernetes storage?", "options": {"A": "To provide a standard for defining StorageClass parameters.", "B": "To enable third-party storage vendors to develop plugins without modifying core Kubernetes code.", "C": "To improve the performance of hostPath volumes.", "D": "To automate the backup and restore of PersistentVolumes.", "E": "To define how containers should access configuration data."}, "answer": "B", "explanation": "CSI is a standard for exposing block and file storage systems to containerized workloads. It allows storage vendors to create plugins that integrate with Kubernetes (and other orchestrators) to manage storage lifecycles, without needing their code to be part of the Kubernetes core.", "domain": null, "competency": "Storage"}, {"id": 18, "question": "What is &quot;pipeline-as-code&quot; in the context of CI/CD?", "options": {"A": "Writing application code directly within the CI/CD tool&#x27;s UI.", "B": "Defining the CI/CD pipeline&#x27;s stages, steps, and configuration using code stored in version control (e.g., Jenkinsfile, GitLab CI YAML).", "C": "Generating pipeline definitions automatically based on monitoring data.", "D": "A specific programming language used exclusively for writing CI/CD pipelines.", "E": "Storing pipeline execution logs as application code."}, "answer": "B", "explanation": "Pipeline-as-code treats the definition of the build, test, and deployment pipeline itself as code. This definition lives in version control alongside the application code, enabling versioning, review, and easier management of the pipeline&#x27;s structure and logic.", "domain": null, "competency": "CI/CD"}, {"id": 18, "question": "What is the primary role of the Cloud Native Computing Foundation (CNCF) in the Kubernetes ecosystem?", "options": {"A": "To directly employ Kubernetes core developers", "B": "To sell Kubernetes enterprise support subscriptions", "C": "To foster and sustain an ecosystem of open source projects", "D": "To define mandatory cloud provider APIs", "E": "To own the intellectual property of Linux"}, "answer": "C", "explanation": "The CNCF hosts and promotes a wide range of open source projects (including Kubernetes, Prometheus, Envoy) to advance cloud native computing, providing governance, support, and community building.", "domain": "Cloud Native Architecture", "competency": "Community and Governance"}, {"id": 18, "question": "Which field in a Pod&#x27;s specification is crucial for the kube-scheduler to determine if a node has sufficient resources?", "options": {"A": "spec.nodeName", "B": "spec.containers[].ports", "C": "spec.containers[].resources.requests", "D": "spec.serviceAccountName", "E": "spec.restartPolicy"}, "answer": "C", "explanation": "The resources.requests field (for CPU and memory) indicates the minimum amount of resources the container needs. The scheduler uses this to filter out nodes that cannot meet these requests.", "domain": null, "competency": "Scheduling"}, {"id": 18, "question": "Why is tagging or labeling resources (e.g., Pods, Nodes, cloud resources) crucial for effective cost management in a shared cloud-native environment?", "options": {"A": "It improves the performance of the Kubernetes scheduler.", "B": "It allows cost allocation and analysis based on specific teams, projects, or environments.", "C": "It automatically encrypts data associated with the tagged resources.", "D": "It enables the use of Vertical Pod Autoscaler (VPA).", "E": "It increases the fault tolerance of the control plane."}, "answer": "B", "explanation": "In shared environments, costs are aggregated. Consistent tagging/labeling allows organizations to filter cost and usage data (often provided by cloud providers or third-party tools) to understand how much each project, team, environment, or application is contributing to the overall cloud spend.", "domain": null, "competency": "Cost Management"}, {"id": 19, "question": "A Site Reliability Engineer (SRE) working with a Kubernetes platform would likely focus most on which area?", "options": {"A": "Designing the user interface for end-user applications.", "B": "Automating platform operations, ensuring reliability/SLOs, and managing incident response.", "C": "Writing feature code for the core business applications running on the platform.", "D": "Defining the marketing strategy for the company&#x27;s cloud native services.", "E": "Choosing which programming language application developers should use."}, "answer": "B", "explanation": "SREs apply software engineering principles to infrastructure and operations problems. They focus on automating tasks, measuring and meeting Service Level Objectives (SLOs) for platform reliability, improving monitoring/alerting, and handling incidents efficiently.", "domain": null, "competency": "Roles and Personas"}, {"id": 19, "question": "Grafana is often used alongside Prometheus. What is Grafana&#x27;s primary role in this context?", "options": {"A": "To store long-term metrics data collected by Prometheus.", "B": "To generate alerts based on Prometheus metrics.", "C": "To provide data visualization and dashboarding for Prometheus metrics (and other sources).", "D": "To replace the Prometheus server for scraping targets.", "E": "To manage Prometheus configuration files."}, "answer": "C", "explanation": "Grafana is a popular open-source visualization platform. It excels at querying data sources like Prometheus and displaying the time-series data in flexible, interactive dashboards with various graph types, tables, and alerts (though Alertmanager is Prometheus&#x27;s native alerter).", "domain": null, "competency": "Telemetry &amp; Observability"}, {"id": 19, "question": "How does the concept of &quot;least privilege&quot; apply to GitOps operators?", "options": {"A": "The operator should run with cluster-admin privileges for maximum flexibility.", "B": "The operator&#x27;s permissions (e.g., via ServiceAccount and RBAC) should be scoped only to the resources it needs to manage.", "C": "Developers interacting with Git should have least privilege; the operator needs full access.", "D": "The operator should only have read-only access to the Git repository.", "E": "Least privilege only applies to CI/CD tools, not GitOps operators."}, "answer": "B", "explanation": "For security, the GitOps operator running in the cluster should be granted only the minimum RBAC permissions required to manage the specific resources defined in its target Git repositories and namespaces. Granting cluster-admin privileges unnecessarily increases the potential blast radius if compromised.", "domain": null, "competency": "GitOps"}, {"id": 19, "question": "In a typical cloud native environment, which persona is most concerned with ensuring application uptime, performance, and managing incident response?", "options": {"A": "Application Developer", "B": "Platform Consumer", "C": "Site Reliability Engineer (SRE) / Platform Operator", "D": "Business Analyst", "E": "End User"}, "answer": "C", "explanation": "SREs and Platform Operators are responsible for the reliability, scalability, and overall operational health of the platform and the applications running on it, including monitoring, alerting, and incident management.", "domain": "Cloud Native Architecture", "competency": "Roles and Personas"}, {"id": 19, "question": "What fundamental concept allows Kubernetes controllers to operate effectively without needing constant instructions?", "options": {"A": "Imperative command execution", "B": "The reconciliation loop (Control Loop)", "C": "Direct manipulation of etcd", "D": "Event-driven webhooks", "E": "Stateful session management"}, "answer": "B", "explanation": "Controllers continuously watch the desired state (from the API server) and the current state (observed in the cluster), taking actions (via the API server) to make the current state match the desired state. This is the core principle of Kubernetes automation.", "domain": null, "competency": "Kubernetes Architecture"}, {"id": 19, "question": "Which of these is NOT a typical benefit of using a container orchestrator for managing applications?", "options": {"A": "Improved resource utilization through bin packing.", "B": "Simplified application code logic for handling infrastructure failures.", "C": "Abstracted underlying infrastructure differences.", "D": "Automatic conversion of monolithic applications to microservices.", "E": "Enhanced scalability and availability of applications."}, "answer": "D", "explanation": "Orchestrators help deploy and manage microservices (and even well-architected monoliths), but they do not automatically refactor or convert application code from a monolithic architecture to a microservices architecture. That&#x27;s a software design and development effort.", "domain": null, "competency": "Container Orchestration Fundamentals"}, {"id": 20, "question": "What does the rate() function in PromQL typically calculate?", "options": {"A": "The total count of a metric over a time range.", "B": "The average value of a gauge metric over a time range.", "C": "The per-second average rate of increase for a counter metric over a time range.", "D": "The 95th percentile value of a histogram metric.", "E": "The current value of a metric label."}, "answer": "C", "explanation": "Counters continuously increase. rate() calculates how fast a counter is increasing per second, averaged over a specified time window. This is essential for understanding throughput or frequency of events (e.g., HTTP requests per second, errors per second).", "domain": null, "competency": "Prometheus"}, {"id": 20, "question": "What is a key characteristic of runc, often used by higher-level runtimes like containerd?", "options": {"A": "It&#x27;s a full-fledged container orchestrator.", "B": "It provides a command-line tool for building OCI-compliant images.", "C": "It&#x27;s a low-level OCI runtime responsible for spawning and running containers.", "D": "It&#x27;s a CNI plugin for configuring Pod networking.", "E": "It&#x27;s a distributed key-value store for container metadata."}, "answer": "C", "explanation": "runc is a CLI tool for spawning and running containers according to the OCI specification. Higher-level runtimes like containerd use runc (or similar OCI runtimes) under the hood to actually execute the containers.", "domain": null, "competency": "Runtime"}, {"id": 20, "question": "What is the purpose of tools like Helm or Kustomize in Kubernetes application delivery?", "options": {"A": "To replace the need for container image registries.", "B": "To provide runtime monitoring and alerting for applications.", "C": "To manage, template, and customize Kubernetes manifest files, simplifying complex deployments.", "D": "To automatically write application source code based on high-level requirements.", "E": "To enforce network security policies between Pods."}, "answer": "C", "explanation": "Deploying applications often involves many related Kubernetes manifests. Helm (packaging/templating) and Kustomize (overlay-based customization) help manage this complexity, allowing for parameterization, reuse, and environment-specific configuration without duplicating large amounts of YAML.", "domain": null, "competency": "CI/CD"}, {"id": 20, "question": "Which OCI (Open Container Initiative) specification defines how container runtimes should execute containers?", "options": {"A": "Image Specification", "B": "Distribution Specification", "C": "Runtime Specification (CRI is Kubernetes&#x27; interface to this)", "D": "Network Specification (CNI is related)", "E": "Storage Specification"}, "answer": "C", "explanation": "The OCI Runtime Specification outlines how to run a container filesystem bundle. Kubernetes uses the Container Runtime Interface (CRI) as an abstraction layer over runtimes like containerd or CRI-O that implement this standard.", "domain": null, "competency": "Containers"}, {"id": 20, "question": "Why are Open Standards, like those defined by the Open Container Initiative (OCI), critical for the cloud native ecosystem?", "options": {"A": "They guarantee better application performance", "B": "They enforce specific vendor implementations", "C": "They promote interoperability and prevent vendor lock-in", "D": "They reduce the need for security patching", "E": "They simplify the user interface of cloud platforms"}, "answer": "C", "explanation": "Open standards (e.g., OCI for container formats/runtimes, CNI for networking, CRI for runtimes) ensure that different tools and platforms can work together seamlessly, giving users choice and preventing vendor lock-in.", "domain": "Cloud Native Architecture", "competency": "Open Standards"}, {"id": 20, "question": "Why is the standardization provided by specifications like CRI (Container Runtime Interface) important for Platform Operators/SREs?", "options": {"A": "It allows them to use docker build commands to manage runtime configuration.", "B": "It simplifies the process of writing application code for developers.", "C": "It gives them flexibility to choose/swap runtimes without disrupting Kubernetes functionality.", "D": "It guarantees that all container runtimes will have identical performance.", "E": "It eliminates the need for managing worker nodes."}, "answer": "C", "explanation": "CRI decouples Kubernetes (kubelet) from the specific runtime implementation. This allows platform operators to choose the runtime that best fits their needs (e.g., containerd, CRI-O) and potentially switch between them with minimal impact on the overall Kubernetes system.", "domain": null, "competency": "Open Standards"}, {"id": 21, "question": "If you need to automatically scale your Kubernetes cluster by adding/removing nodes based on overall resource pressure, which component is responsible?", "options": {"A": "Horizontal Pod Autoscaler (HPA)", "B": "Vertical Pod Autoscaler (VPA)", "C": "Cluster Autoscaler (CA)", "D": "kube-scheduler", "E": "metrics-server"}, "answer": "C", "explanation": "The Cluster Autoscaler specifically monitors for unschedulable Pods (due to resource constraints) and interacts with the underlying infrastructure (e.g., cloud provider) to add more nodes. It also consolidates workloads and removes underutilized nodes.", "domain": null, "competency": "Autoscaling"}, {"id": 21, "question": "In a GitOps workflow, how are changes typically promoted across different environments (e.g., staging to production)?", "options": {"A": "By directly modifying the live production cluster using kubectl.", "B": "By manually copying manifests from a staging directory to a production directory on a local machine.", "C": "By merging or promoting changes between branches or directories in the Git repository that represent different environments.", "D": "By re-running the entire CI pipeline with a &quot;production&quot; flag.", "E": "By configuring the GitOps operator to ignore environment differences."}, "answer": "C", "explanation": "A common GitOps pattern is to represent each environment (dev, staging, prod) as a separate branch or directory in Git. Promoting a change involves merging code/configuration from the staging branch/directory to the production branch/directory. The GitOps operator watching production then applies the change.", "domain": null, "competency": "GitOps"}, {"id": 21, "question": "What is the primary purpose of Secrets in Kubernetes, and how are they typically made available to Pods?", "options": {"A": "To store arbitrary non-sensitive configuration; as environment variables or files.", "B": "To store sensitive data (e.g., passwords, tokens); as environment variables or volume mounts.", "C": "To define network policies; applied directly by kubelet.", "D": "To store TLS certificates for Ingress; only used by Ingress controllers.", "E": "To store container image pull credentials; only used by kubelet."}, "answer": "B", "explanation": "Secrets are designed for sensitive information. While they can be used for image pull credentials, their broader use is for application secrets. They are base64 encoded (not encrypted by default in etcd) and can be mounted as files into Pods or exposed as environment variables.", "domain": null, "competency": "Security"}, {"id": 21, "question": "Which strategy helps manage costs associated with persistent storage in Kubernetes?", "options": {"A": "Using only hostPath volumes for all stateful applications.", "B": "Regularly reviewing PersistentVolumeClaim (PVC) usage and cleaning up unused volumes.", "C": "Disabling the Container Storage Interface (CSI) plugin.", "D": "Storing all application data within container images.", "E": "Setting storageClassName to a non-existent class."}, "answer": "B", "explanation": "Persistent storage often incurs costs. Orphaned PVCs (no longer used by any Pod) or PVCs attached to terminated resources can lead to unnecessary spending. Regularly auditing PVCs and deleting unused ones, potentially based on age or lack of mounting, is a key cost optimization practice.", "domain": null, "competency": "Cost Management"}, {"id": 21, "question": "Which type of telemetry data is most suitable for understanding the sequence of operations and latency across multiple microservices for a single user request?", "options": {"A": "Logs", "B": "Metrics", "C": "Traces (Distributed Tracing)", "D": "Events", "E": "Alerts"}, "answer": "C", "explanation": "Distributed tracing captures the end-to-end flow of a request as it propagates through different services, providing insights into latency bottlenecks and dependencies.", "domain": "Cloud Native Observability", "competency": "Telemetry &amp; Observability"}, {"id": 21, "question": "You need to provide non-sensitive configuration data (like a URL endpoint or logging level) to a Pod. Which resource is most appropriate?", "options": {"A": "Secret", "B": "ConfigMap", "C": "Annotation", "D": "ResourceQuota", "E": "DownwardAPI"}, "answer": "B", "explanation": "ConfigMaps are designed specifically for decoupling non-sensitive configuration artifacts from container images, allowing configurations to be managed independently.", "domain": null, "competency": "Kubernetes Resources"}, {"id": 22, "question": "An Ingress resource in Kubernetes provides what type of functionality?", "options": {"A": "L4 TCP/UDP load balancing for internal services.", "B": "Management of external HTTP/S access to services, with host/path based routing.", "C": "Network isolation between Pods within the same namespace.", "D": "Dynamic provisioning of persistent storage for web servers.", "E": "A CNI plugin implementation for advanced networking features."}, "answer": "B", "explanation": "Ingress objects manage external access to services in a cluster, typically HTTP/S. They provide L7 features like host-based routing (e.g., foo.example.com) and path-based routing (e.g., example.com/bar), acting as a reverse proxy. An Ingress controller implements these rules.", "domain": null, "competency": "Networking"}, {"id": 22, "question": "If you want a specific Pod to run on every node in the cluster (or a subset matching certain criteria), which workload resource should you use?", "options": {"A": "Deployment", "B": "StatefulSet", "C": "DaemonSet", "D": "Job", "E": "ReplicaSet"}, "answer": "C", "explanation": "A DaemonSet ensures that a copy of a Pod runs on all (or some specified) nodes. This is useful for node-level agents like log collectors, monitoring agents, or CNI plugins.", "domain": null, "competency": "Kubernetes Resources"}, {"id": 22, "question": "Prometheus is primarily designed for which type of observability data?", "options": {"A": "Distributed tracing", "B": "Log aggregation and analysis", "C": "Time-series metrics collection and alerting", "D": "Security auditing and compliance reporting", "E": "Real-time user monitoring (RUM)"}, "answer": "C", "explanation": "Prometheus excels at collecting, storing, and querying time-series data (metrics) from various targets, and it includes a powerful alerting mechanism based on PromQL.", "domain": "Cloud Native Observability", "competency": "Prometheus"}, {"id": 22, "question": "What is a &quot;Service Level Objective&quot; (SLO) in the context of observability and SRE?", "options": {"A": "A detailed log message indicating a service failure.", "B": "A contractual agreement with a cloud provider for uptime (SLA).", "C": "A specific, measurable target for a service&#x27;s reliability or performance (e.g., 99.9% availability).", "D": "A dashboard showing real-time resource utilization.", "E": "An alert configured in Alertmanager."}, "answer": "C", "explanation": "An SLO is an internal target for service reliability, often based on user happiness metrics (e.g., availability, latency). Observability data (metrics, logs) is used to measure performance against SLOs. Service Level Indicators (SLIs) are the metrics used to measure SLO compliance. SLAs are external agreements.", "domain": null, "competency": "Telemetry &amp; Observability"}, {"id": 22, "question": "What is the significance of using unique, immutable tags (e.g., Git SHA, semantic version) for container images in a CI/CD pipeline?", "options": {"A": "It allows developers to overwrite existing tags like latest for simplicity.", "B": "It makes it difficult to track which version of the code is running in production.", "C": "It ensures that deployments are predictable and repeatable, always pulling the exact intended version of the image.", "D": "It reduces the storage space required in the container registry.", "E": "It is primarily for aesthetic purposes in dashboard displays."}, "answer": "C", "explanation": "Using mutable tags like latest is dangerous, as the underlying image can change without the deployment configuration changing, leading to unexpected behavior. Immutable tags ensure that my-app:v1.2.3 always refers to the exact same image build, making deployments deterministic and rollbacks reliable.", "domain": null, "competency": "CI/CD"}, {"id": 22, "question": "Which statement best describes the concept of &quot;scale to zero&quot; in serverless platforms?", "options": {"A": "The platform uses zero resources when no functions are deployed.", "B": "Application instances are automatically removed when idle, consuming no resources.", "C": "Functions are limited to executing for zero seconds (instantaneous execution).", "D": "The platform requires zero configuration from the developer to deploy functions.", "E": "Only zero-cost open source serverless platforms support this feature."}, "answer": "B", "explanation": "&quot;Scale to zero&quot; means that if a serverless function or application receives no traffic or events for a period, the platform automatically scales down the number of running instances to zero. This stops resource consumption and associated costs during idle periods.", "domain": null, "competency": "Serverless"}, {"id": 23, "question": "In Prometheus, what is an &quot;exporter&quot;?", "options": {"A": "A component that sends alerts to notification channels", "B": "A database that stores long-term metric data", "C": "A client library for instrumenting application code", "D": "A piece of software that exposes metrics from third-party systems", "E": "A dashboard for visualizing metrics"}, "answer": "D", "explanation": "Exporters are helper services that fetch metrics from systems that don&#x27;t natively expose them in Prometheus format (e.g., databases, hardware, message queues) and translate them into a format Prometheus can scrape.", "domain": "Cloud Native Observability", "competency": "Prometheus"}, {"id": 23, "question": "In the context of a Service Mesh, what does &quot;traffic splitting&quot; commonly refer to?", "options": {"A": "Dividing network bandwidth equally among all services.", "B": "Routing a percentage of traffic to different versions of a service (e.g., for canary).", "C": "Encrypting only a portion of the traffic between services.", "D": "Splitting large data packets into smaller frames for transmission.", "E": "Blocking traffic from specific IP address ranges."}, "answer": "B", "explanation": "Traffic splitting is a Service Mesh capability that allows routing specific percentages of incoming requests to different versions of a service. This is crucial for deployment strategies like canary releases or A/B testing, allowing gradual rollouts and risk mitigation.", "domain": null, "competency": "Service Mesh"}, {"id": 23, "question": "What does it mean for the Kubernetes API to be &quot;declarative&quot;?", "options": {"A": "API calls must be made sequentially", "B": "Users specify the desired end state, not the steps to reach it", "C": "The API only accepts YAML formatted requests", "D": "API responses always include the full resource specification", "E": "The API can only create resources, not update or delete them"}, "answer": "B", "explanation": "Users declare the desired state of resources (e.g., &quot;I want 3 replicas of this Pod&quot;). Kubernetes controllers then figure out the sequence of actions needed to achieve and maintain that state. Contrast this with imperative approaches (&quot;run container X&quot;, &quot;scale up by 1&quot;).", "domain": null, "competency": "Kubernetes API"}, {"id": 23, "question": "What information does a Prometheus Histogram metric provide that a simple Gauge or Counter does not?", "options": {"A": "The exact time when the metric last changed value.", "B": "The total number of times an event has occurred.", "C": "The distribution of observed values across a set of configurable buckets.", "D": "The current status (up/down) of the monitored target.", "E": "The geographic location of the monitored instance."}, "answer": "C", "explanation": "Histograms sample observations (e.g., request latencies) and count them in configurable buckets (e.g., &lt;=100ms, &lt;=200ms, &lt;=500ms). They also provide the sum and count of observations. This allows calculating approximate quantiles (e.g., 95th percentile latency) using functions like histogram_quantile().", "domain": null, "competency": "Prometheus"}, {"id": 23, "question": "What is a key benefit of automating application delivery pipelines?", "options": {"A": "It increases the need for manual intervention and approvals at each stage.", "B": "It introduces more opportunities for human error during deployment.", "C": "It leads to faster, more reliable, and consistent deployments, enabling quicker feedback loops.", "D": "It makes the deployment process less transparent and harder to audit.", "E": "It primarily benefits only very small development teams."}, "answer": "C", "explanation": "Automation removes manual steps, reducing the chance of human error and speeding up the entire process from code commit to deployment. This consistency and speed enable teams to release value more frequently and get feedback faster.", "domain": null, "competency": "Application Delivery Fundamentals"}, {"id": 23, "question": "What is the significance of the CNCF Landscape (landscape.cncf.io)?", "options": {"A": "It&#x27;s the official source code repository for all CNCF projects.", "B": "It&#x27;s a legally binding contract defining how member companies must use CNCF software.", "C": "It provides an interactive map categorizing and organizing projects within the cloud native ecosystem.", "D": "It&#x27;s the primary tool used for deploying applications to Kubernetes clusters.", "E": "It&#x27;s a real-time dashboard showing the operational status of CNCF projects."}, "answer": "C", "explanation": "The CNCF Landscape is a vital resource that attempts to map the vast cloud native ecosystem, organizing projects and products into categories (e.g., database, scheduling, observability). It helps users navigate the available tools and understand the relationships between them.", "domain": null, "competency": "Community and Governance"}];

  {"question": "What are the two essential operations that the kube-scheduler normally performs?", "options": {"A": "Starting and terminating containers", "B": "Filtering and Scoring nodes", "C": "Resources monitoring and reporting", "D": "Pod eviction or starting"}, "answer": "B", "explanation": "kube-scheduler works in two phases: Filtering (finds nodes that meet Pod requirements) and Scoring (ranks eligible nodes to pick the best one).", "domain": "Kubernetes Fundamentals", "competency": "Scheduling"},

  {"question": "A Pod needs to be configured for a slow-starting application. What is the best approach to ensure the Pod is only marked as ready when it is fully initialized?", "options": {"A": "Use both readiness and startup probes", "B": "Use both liveness and startup probes", "C": "Use a startup probe only", "D": "Use a readiness probe only"}, "answer": "B", "explanation": "For slow-starting applications, a startup probe delays liveness checks until the app is ready. Combined with a liveness probe, it ensures the container stays healthy after startup.", "domain": "Kubernetes Fundamentals", "competency": "Containers"},

// ============================================================
// COMBINE ALL QUESTIONS with unique sequential IDs
// ============================================================
let nextId = 1;
const ALL_DATA = [];

// Add original questions (renumber them)
for (const q of ORIGINAL_DATA) {
  ALL_DATA.push({
    id: nextId++,
    question: q.question,
    options: q.options,
    answer: q.answer,
    explanation: q.explanation,
    domain: q.domain,
    competency: q.competency
  });
}

// Add KCNA 2025 questions
for (const q of KCNA2025_DATA) {
  ALL_DATA.push({
    id: nextId++,
    question: q.question,
    options: q.options,
    answer: q.answer,
    explanation: q.explanation,
    domain: q.domain,
    competency: q.competency
  });
}

const DATA = ALL_DATA;
console.log(`Loaded ${DATA.length} total questions (${ORIGINAL_DATA.length} original + ${KCNA2025_DATA.length} KCNA 2025)`);

const state = {
  started:false,
  filterMode:'none',
  domain:'',
  competency:'',
  search:'',
  count:20,
  shuffle:true,
  pool:[],
  quiz:[],
  idx:0,
  score:0,
  answers:[] // {picked, correct}
};

function uniq(arr){ return Array.from(new Set(arr.filter(Boolean))).sort(); }
function shuf(a){ const x=a.slice(); for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];} return x; }

const domains = uniq(DATA.map(q=>q.domain));
const competencies = uniq(DATA.map(q=>q.competency));

const left = document.getElementById('left');
const right = document.getElementById('right');
const pill = document.getElementById('pillCount');
document.getElementById('btnReset').onclick = ()=>{ reset(); render(); };

function reset(){ state.started=false; state.idx=0; state.score=0; state.answers=[]; buildPool(); }
function buildPool(){
  let p = DATA;
  if(state.filterMode==='domain' && state.domain) p = p.filter(x => (x.domain||'').toLowerCase()===state.domain.toLowerCase());
  if(state.filterMode==='competency' && state.competency) p = p.filter(x => (x.competency||'').toLowerCase()===state.competency.toLowerCase());
  if(state.filterMode==='search' && state.search.trim()){
    const n = state.search.toLowerCase();
    p = p.filter(x => (x.question||'').toLowerCase().includes(n) ||
                      Object.values(x.options||{}).some(v => (v||'').toLowerCase().includes(n)) ||
                      (x.explanation||'').toLowerCase().includes(n));
  }
  state.pool = p;
  pill.textContent = DATA.length + ' questions total (' + state.pool.length + ' in current filter)';
}

function start(){
  let arr = state.pool.slice();
  if(state.shuffle) arr = shuf(arr);
  state.quiz = arr.slice(0, Math.min(state.count, arr.length));
  state.idx=0; state.score=0; state.answers=[]; state.started=true;
  render();
}

function pick(letter){
  const q = state.quiz[state.idx];
  if(!q) return;
  const ansLetter = (q.answer||'').toString().trim().toUpperCase() || null;
  const graded = !!ansLetter && q.options && q.options[ansLetter];
  if(state.answers[state.idx]) return;
  const isCorrect = graded ? (letter===ansLetter) : null;
  state.answers[state.idx] = {picked:letter, correct:isCorrect};
  if(isCorrect===true) state.score += 1;
  render();
}

function nextQ(){ if(state.idx < state.quiz.length-1){ state.idx += 1; render(); } else { state.started=false; render(); } }
function gotoIdx(i){ state.idx = i; render(); }

function progressHTML(){
  const pct = state.quiz.length ? Math.round(((state.idx + (state.answers[state.idx]?1:0)) / state.quiz.length) * 100) : 0;
  return '<div class="progress"><div class="bar" style="width:'+pct+'%"></div></div>';
}

function optionBtn(letter, text, q, ans){
  const ansLetter = (q.answer||'').toString().trim().toUpperCase() || null;
  const graded = !!ansLetter && q.options && q.options[ansLetter];
  let cls = 'opt';
  if(ans){
    if(graded){
      if(letter===ansLetter) cls += ' correct';
      else if(ans.picked===letter) cls += ' wrong';
      else cls += ' disabled';
    }else{
      cls += ' disabled';
    }
  }
  return '<button class="'+cls+'" onclick="pick(\''+letter+'\')"><b>'+letter+'.</b> '+text+'</button>';
}

function renderStart(){
  right.innerHTML = [
    '<h3 style="margin:0 0 8px;font-weight:600">About</h3>',
    '<p class="sub">Choose a filter, set question count, answer to get instant feedback and explanations.</p>',
    '<div class="sub"><span class="pill" style="margin-right:6px">'+domains.length+' domains</span>',
    '<span class="pill">'+competencies.length+' competencies</span></div>'
  ].join('');

  const dyn = (state.filterMode==='domain') ? (
    '<label>Domain</label><select id="domSel" class="mt-1"><option value="">— Select —</option>'+domains.map(d=>'<option>'+d+'</option>').join('')+'</select>'
  ) : (state.filterMode==='competency') ? (
    '<label>Competency</label><select id="compSel" class="mt-1"><option value="">— Select —</option>'+competencies.map(c=>'<option>'+c+'</option>').join('')+'</select>'
  ) : (state.filterMode==='search') ? (
    '<label>Search</label><input id="searchInp" class="mt-1" placeholder="Type keywords…">'
  ) : '';

  left.innerHTML = [
    '<div style="color:#475569;margin-bottom:10px">Filters</div>',
    '<div class="tiles" style="grid-template-columns:repeat(2,minmax(0,1fr))">',
      '<div>',
        '<label>Filter mode</label>',
        '<select id="modeSel" class="mt-1">',
          '<option value="none">None</option>',
          '<option value="domain">By Domain</option>',
          '<option value="competency">By Competency</option>',
          '<option value="search">Search text</option>',
        '</select>',
      '</div>',
      '<div id="dynWrap">'+dyn+'</div>',
      '<div>',
        '<label>Number of questions</label>',
        '<input id="countInp" type="number" class="mt-1" min="5" max="'+(state.pool.length||50)+'" value="'+state.count+'">',
        '<div class="sub" style="margin-top:6px">Available in pool: '+state.pool.length+'</div>',
      '</div>',
      '<div style="display:flex;align-items:center;gap:8px;margin-top:8px">',
        '<input id="shuffleChk" type="checkbox" '+(state.shuffle?'checked':'')+'>',
        '<label>Shuffle questions</label>',
      '</div>',
    '</div>',
    '<button id="btnStart" class="btn primary" style="margin-top:12px" '+(state.pool.length===0?'disabled':'')+'>Start Quiz</button>'
  ].join('');

  document.getElementById('modeSel').value = state.filterMode;
  document.getElementById('modeSel').onchange = (e)=>{ state.filterMode = e.target.value; buildPool(); render(); };

  if(state.filterMode==='domain'){
    const sel = document.getElementById('domSel');
    sel.value = state.domain;
    sel.onchange = ()=>{ state.domain = sel.value; buildPool(); render(); };
  }else if(state.filterMode==='competency'){
    const sel = document.getElementById('compSel');
    sel.value = state.competency;
    sel.onchange = ()=>{ state.competency = sel.value; buildPool(); render(); };
  }else if(state.filterMode==='search'){
    const inp = document.getElementById('searchInp');
    inp.value = state.search;
    inp.oninput = ()=>{ state.search = inp.value; buildPool(); };
  }

  document.getElementById('countInp').onchange = (e)=>{ state.count = Math.max(5, parseInt(e.target.value||'20',10)); };
  document.getElementById('shuffleChk').onchange = (e)=>{ state.shuffle = e.target.checked; };
  document.getElementById('btnStart').onclick = start;
}

function renderQuiz(){
  const q = state.quiz[state.idx];
  const ans = state.answers[state.idx];
  const ansLetter = (q.answer||'').toString().trim().toUpperCase() || null;
  const graded = !!ansLetter && q.options && q.options[ansLetter];
  const isLast = state.idx === state.quiz.length - 1;

  left.innerHTML = [
    '<div style="display:flex;justify-content:space-between;align-items:center">',
      '<span class="pill">Question '+(state.idx+1)+' of '+state.quiz.length+'</span>',
      progressHTML(),
    '</div>',
    '<h2 style="font-size:18px;margin:12px 0 8px;font-weight:600">'+q.question+'</h2>',
    (q.domain?'<span class="pill" style="margin-right:6px">Domain: '+q.domain+'</span>':''),
    (q.competency?'<span class="pill">Competency: '+q.competency+'</span>':''),
    '<div class="options" style="margin-top:10px">',
      Object.entries(q.options||{}).map(([L,T])=>optionBtn(L,T,q,ans)).join(''),
    '</div>',
    (ans?('<div class="card" style="padding:12px;margin-top:10px">'+(graded?(ans.correct?'<b style="color:#16a34a">✓ Correct!</b>':'<b style="color:#dc2626">✗ Incorrect.</b> Correct answer: <b>'+ansLetter+'</b>'):'<b>Study mode:</b> no official answer provided.')+(q.explanation?'<div class="sub" style="margin-top:6px">'+q.explanation+'</div>':'')+'</div>'):'') ,
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">',
      '<div class="sub">Score: '+state.score+' / '+state.quiz.length+'</div>',
      (!isLast?'<button class="btn" '+(!ans?'disabled':'')+' onclick="nextQ()">Next →</button>':'<button class="btn primary" onclick="finish()">Finish</button>'),
    '</div>'
  ].join('');

  right.innerHTML = [
    '<h3 style="margin:0 0 8px;font-weight:600">Question Navigator</h3>',
    '<div class="tiles">',
      state.quiz.map((item, i)=>'<button class="tile '+(i===state.idx?'active':'')+'" onclick="gotoIdx('+i+')">Q'+(i+1)+'<br><span class="sub">'+(item.question||'').slice(0,42)+'…</span></button>').join(''),
    '</div>'
  ].join('');
}

function finish(){ state.started=false; render(); }

function render(){
  buildPool();
  if(!state.started) renderStart();
  else renderQuiz();
}

// Expose functions globally
window.pick = pick;
window.nextQ = nextQ;
window.gotoIdx = gotoIdx;
window.finish = finish;

reset();
render();
</script>
</body>
</html>
